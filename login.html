<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Music Club Орёл</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffeaa7, #fdcb6e, #fab1a0);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
            width: 300px;
        }
        input, button {
            width: 100%;
            padding: 0.7rem;
            margin: 0.5rem 0;
            border: 1px solid #ccc;
            border-radius: 10px;
        }
        button {
            background: #ff6b6b;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .error { color: red; }
        .info { color: gray; }
        .toggle { color: #d63031; cursor: pointer; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="formTitle">Вход</h2>
        <div id="error" class="error"></div>
        <div id="info" class="info"></div>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Пароль">
        <button id="submitBtn">Войти</button>
        <div id="toggleForm" class="toggle">Нет аккаунта? Зарегистрироваться</div>
    </div>

    <script>
        // Переменная названа по-другому, чтобы избежать конфликта
        const SUPABASE_URL = 'https://ujsakubqnirmpdwmmtju.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqc2FrdWJxbmlybXBkd21tdGp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNDUwOTEsImV4cCI6MjA5ODgyMTA5MX0.8YZCsCpjroirJvKuQie76qXtpOvpmpE7dQoz2G502p4';
        const SITE_URL = 'https://arturbizz.github.io/sport';
        const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let mode = 'login';

        const formTitle = document.getElementById('formTitle');
        const submitBtn = document.getElementById('submitBtn');
        const toggleForm = document.getElementById('toggleForm');
        const errorEl = document.getElementById('error');
        const infoEl = document.getElementById('info');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');

        (async () => {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) window.location.href = 'index.html';
        })();

        toggleForm.addEventListener('click', () => {
            mode = mode === 'login' ? 'register' : 'login';
            formTitle.textContent = mode === 'login' ? 'Вход' : 'Регистрация';
            submitBtn.textContent = mode === 'login' ? 'Войти' : 'Зарегистрироваться';
            toggleForm.textContent = mode === 'login' ? 'Нет аккаунта? Зарегистрироваться' : 'Уже есть аккаунт? Войти';
            errorEl.textContent = '';
            infoEl.textContent = '';
        });

        submitBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            errorEl.textContent = '';
            infoEl.textContent = '';

            if (!email || !password) {
                errorEl.textContent = 'Заполните все поля';
                return;
            }
            if (password.length < 6) {
                errorEl.textContent = 'Пароль минимум 6 символов';
                return;
            }

            submitBtn.disabled = true;
            try {
                if (mode === 'login') {
                    const { error } = await _supabase.auth.signInWithPassword({ email, password });
                    if (error) {
                        errorEl.textContent = error.message === 'Invalid login credentials' ? 'Неверный email или пароль' : error.message;
                        return;
                    }
                    window.location.href = 'index.html';
                } else {
                    const { data, error } = await _supabase.auth.signUp({
                        email,
                        password,
                        options: {
                            emailRedirectTo: `${SITE_URL}/login.html`
                        }
                    });
                    if (error) {
                        errorEl.textContent = error.message;
                        return;
                    }
                    if (data.user && data.user.identities && data.user.identities.length === 0) {
                        errorEl.textContent = 'Этот email уже зарегистрирован. Попробуйте войти или восстановить пароль.';
                        return;
                    }
                    if (data.session) {
                        window.location.href = 'index.html';
                    } else {
                        infoEl.textContent = 'Регистрация успешна! Проверьте почту для подтверждения.';
                        mode = 'login';
                        formTitle.textContent = 'Вход';
                        submitBtn.textContent = 'Войти';
                        toggleForm.textContent = 'Нет аккаунта? Зарегистрироваться';
                    }
                }
            } catch (err) {
                errorEl.textContent = 'Ошибка соединения. Проверьте интернет.';
            } finally {
                submitBtn.disabled = false;
            }
        });

        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitBtn.click();
        });
    </script>
</body>
</html>
