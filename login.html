<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Music Club Орёл</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --surface: #ffffff;
      --text: #0f172a;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --accent: #3b82f6;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f0f4ff, #fff, #f0f9ff);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }
    .card {
      background: var(--surface);
      border-radius: 24px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      text-align: center;
    }
    h2 { margin-bottom: 1.5rem; }
    input {
      width: 100%;
      padding: 0.8rem;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 1rem;
    }
    button {
      width: 100%;
      padding: 0.8rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
      margin-top: 0.5rem;
    }
    button:hover { background: #2563eb; }
    .toggle {
      margin-top: 1rem;
      color: var(--accent);
      cursor: pointer;
      font-weight: 500;
    }
    .error {
      color: #ef4444;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2 id="formTitle">Вход</h2>
    <div id="error" class="error"></div>
    <input type="email" id="email" placeholder="Email" autocomplete="email">
    <input type="password" id="password" placeholder="Пароль" autocomplete="current-password">
    <button id="submitBtn">Войти</button>
    <div class="toggle" id="toggleForm">Нет аккаунта? Зарегистрироваться</div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ujsakubqnirmpdwmmtju.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqc2FrdWJxbmlybXBkd21tdGp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNDUwOTEsImV4cCI6MjA5ODgyMTA5MX0.8YZCsCpjroirJvKuQie76qXtpOvpmpE7dQoz2G502p4';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let mode = 'login'; // 'login' or 'register'

    document.getElementById('toggleForm').addEventListener('click', () => {
      mode = mode === 'login' ? 'register' : 'login';
      document.getElementById('formTitle').textContent = mode === 'login' ? 'Вход' : 'Регистрация';
      document.getElementById('submitBtn').textContent = mode === 'login' ? 'Войти' : 'Зарегистрироваться';
      document.getElementById('toggleForm').textContent = mode === 'login' ? 'Нет аккаунта? Зарегистрироваться' : 'Уже есть аккаунт? Войти';
      document.getElementById('error').textContent = '';
    });

    document.getElementById('submitBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error');
      errorEl.textContent = '';

      if (!email || !password) {
        errorEl.textContent = 'Заполните все поля';
        return;
      }

      const { data, error } = mode === 'login'
        ? await supabase.auth.signInWithPassword({ email, password })
        : await supabase.auth.signUp({ email, password });

      if (error) {
        errorEl.textContent = error.message;
        return;
      }

      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
