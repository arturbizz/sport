<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Music Club Орёл</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #ffeaa7, #fdcb6e, #fab1a0); min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
    .card { background: white; border-radius: 24px; padding: 2.5rem; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; }
    h2 { margin-bottom: 1.5rem; color: #2d3436; }
    input { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid #e0e0e0; border-radius: 12px; font-size: 1rem; }
    button { width: 100%; padding: 0.8rem; background: #ff6b6b; color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 1rem; margin-top: 0.5rem; }
    button:hover { background: #ee5a24; }
    .toggle { margin-top: 1rem; color: #d63031; cursor: pointer; }
    .error { color: #d63031; margin-bottom: 0.5rem; }
    .info { color: #636e72; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <div class="card">
    <h2 id="formTitle">Вход</h2>
    <div id="error" class="error"></div>
    <div id="info" class="info"></div>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Пароль">
    <button id="submitBtn">Войти</button>
    <div class="toggle" id="toggleForm">Нет аккаунта? Зарегистрироваться</div>
  </div>
  <script>
    alert('Скрипт загружен'); // ← проверка
    const SUPABASE_URL = 'https://ujsakubqnirmpdwmmtju.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqc2FrdWJxbmlybXBkd21tdGp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNDUwOTEsImV4cCI6MjA5ODgyMTA5MX0.8YZCsCpjroirJvKuQie76qXtpOvpmpE7dQoz2G502p4';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let mode = 'login';
    const formTitle = document.getElementById('formTitle');
    const submitBtn = document.getElementById('submitBtn');
    const toggleForm = document.getElementById('toggleForm');
    const errorEl = document.getElementById('error');
    const infoEl = document.getElementById('info');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    toggleForm.addEventListener('click', () => {
      mode = mode === 'login' ? 'register' : 'login';
      formTitle.textContent = mode === 'login' ? 'Вход' : 'Регистрация';
      submitBtn.textContent = mode === 'login' ? 'Войти' : 'Зарегистрироваться';
      toggleForm.textContent = mode === 'login' ? 'Нет аккаунта? Зарегистрироваться' : 'Уже есть аккаунт? Войти';
      errorEl.textContent = '';
      infoEl.textContent = '';
    });

    submitBtn.addEventListener('click', async () => {
      alert('Клик по кнопке'); // ← проверка клика
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      errorEl.textContent = '';
      infoEl.textContent = '';
      if (!email || !password) { errorEl.textContent = 'Заполните все поля'; return; }
      if (mode === 'login') {
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) { errorEl.textContent = error.message; return; }
        window.location.href = 'index.html';
      } else {
        const { data, error } = await supabase.auth.signUp({ email, password });
        if (error) { errorEl.textContent = error.message; return; }
        if (data.session) {
          window.location.href = 'index.html';
        } else {
          infoEl.textContent = 'Регистрация прошла успешно! Проверьте почту для подтверждения.';
          mode = 'login';
          formTitle.textContent = 'Вход';
          submitBtn.textContent = 'Войти';
          toggleForm.textContent = 'Нет аккаунта? Зарегистрироваться';
        }
      }
    });
  </script>
</body>
</html>
