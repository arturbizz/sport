<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>Планировщик — Music Club Орёл</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #ff6b6b;
      --bg: #fef9f0;
      --surface: rgba(255,255,255,0.85);
      --text: #2d3436;
      --text-light: #636e72;
      --border: #e0e0e0;
      --critical: #e74c3c;
      --high: #e67e22;
      --medium: #f1c40f;
      --low: #2ecc71;
      --idea: #9b59b6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #ffe0f0 0%, #fefce8 50%, #e0f0ff 100%);
      color: var(--text);
      padding: 1.5rem;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      position: relative;
      overflow-x: hidden;
    }
    .music-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .note {
      position: absolute;
      font-size: 2rem;
      color: rgba(255,107,107,0.15);
      animation: floatNote 10s infinite ease-in-out;
    }
    .note::before { content: '♪'; }
    .note.two::before { content: '♫'; }
    .note.three::before { content: '♩'; }
    .clef {
      position: absolute;
      font-size: 5rem;
      color: rgba(249,202,36,0.15);
      animation: pulse 6s infinite;
    }
    .clef::before { content: '𝄞'; }
    @keyframes floatNote {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.5; }
      50% { transform: translateY(-25px) rotate(5deg); opacity: 0.9; }
      100% { transform: translateY(0) rotate(0deg); opacity: 0.5; }
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.15); opacity: 0.8; }
      100% { transform: scale(1); opacity: 0.4; }
    }

    .container {
      position: relative; z-index: 2;
      width: 100%;
      max-width: 1200px;
      background: var(--surface);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      border: 1px solid rgba(255,255,255,0.6);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .back-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
    }
    h1 { font-size: 2rem; font-weight: 700; color: #ff4d6d; }
    .btn {
      border: none;
      padding: 0.6rem 1.3rem;
      border-radius: 14px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: white;
      box-shadow: 0 4px 8px rgba(255,107,107,0.2);
    }
    .btn:hover {
      box-shadow: 0 8px 20px rgba(255,107,107,0.4);
      transform: translateY(-2px);
    }
    .btn-outline {
      background: transparent;
      border: 2px solid var(--accent);
      color: var(--accent);
    }
    .btn-outline:hover {
      background: var(--accent);
      color: white;
    }
    .btn-save {
      background: #ff4d6d;
      color: white;
      border: none;
      box-shadow: 0 4px 15px rgba(255,77,109,0.4);
    }
    .btn-save:hover {
      background: #e04050;
      box-shadow: 0 8px 25px rgba(255,77,109,0.6);
    }
    .btn:disabled { opacity: 0.5; cursor: default; }

    .filters {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
      align-items: center;
    }
    .filter-btn {
      padding: 0.4rem 1rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: white;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      transition: 0.2s;
    }
    .filter-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .employee-filter-wrap {
      position: relative;
      display: inline-block;
    }
    .employee-filter-btn {
      padding: 0.4rem 1rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: white;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .employee-filter-dropdown {
      position: absolute;
      top: 2.5rem;
      left: 0;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      padding: 0.5rem;
      display: none;
      z-index: 10;
    }
    .employee-filter-dropdown select {
      border: none;
      font-size: 0.8rem;
      padding: 0.3rem;
      outline: none;
    }

    .tasks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 1rem;
    }
    .task-card {
      background: white;
      border: 2px solid #ffe0e0;
      border-radius: 20px;
      padding: 1.2rem;
      box-shadow: 0 6px 15px rgba(0,0,0,0.05);
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      position: relative;
    }
    .task-card:hover {
      border-color: #ff6b6b;
      box-shadow: 0 12px 25px rgba(255,107,107,0.2);
      transform: translateY(-3px);
    }
    .task-card.critical-overdue {
      animation: shake 0.5s infinite, glowRed 1s infinite alternate;
      border-color: var(--critical);
    }
    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-3px); }
      50% { transform: translateX(3px); }
      75% { transform: translateX(-3px); }
      100% { transform: translateX(0); }
    }
    @keyframes glowRed {
      0% { box-shadow: 0 0 5px red; }
      100% { box-shadow: 0 0 20px red; }
    }
    .task-title {
      font-weight: 700;
      font-size: 1.1rem;
      color: #ff4d6d;
    }
    .task-meta {
      font-size: 0.8rem;
      color: var(--text-light);
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-block;
      padding: 0.25rem 0.7rem;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 600;
      align-self: flex-start;
    }
    .badge.in_progress { background: #d1fae5; color: #065f46; }
    .badge.clarifying { background: #fef3c7; color: #92400e; }
    .badge.need_help { background: #fee2e2; color: #991b1b; }
    .badge.completed { background: #e0e7ff; color: #3730a3; }
    .priority-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 0.3rem;
    }
    .help-indicator {
      position: absolute;
      top: -5px; right: -5px;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #f9ca24;
      animation: pulse 1.5s infinite;
      display: none;
    }
    .help-indicator.show { display: block; }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal {
      background: white;
      border-radius: 24px;
      padding: 2rem;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 25px 50px rgba(0,0,0,0.2);
      animation: slideUp 0.2s ease-out;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    input, textarea, select {
      width: 100%;
      padding: 0.6rem;
      margin: 0.5rem 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.9rem;
      font-family: inherit;
      caret-color: auto; /* курсор только при фокусе */
    }
    /* Убираем курсор для всех элементов, которые не в фокусе */
    body *:not(input):not(textarea):not([contenteditable="true"]) {
      caret-color: transparent;
    }

    .radio-group {
      display: flex;
      gap: 1rem;
      align-items: center;
      margin: 0.5rem 0;
    }

    /* Колокольчик */
    .bell-icon {
      position: relative;
      cursor: pointer;
      margin-left: 1rem;
    }
    .bell-icon svg {
      width: 24px; height: 24px;
      stroke: var(--text-light);
      fill: none;
    }
    .bell-badge {
      position: absolute;
      top: -8px; right: -10px;
      background: #ff4d6d;
      color: white;
      border-radius: 50%;
      width: 20px; height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
    }
    .notifications-list {
      max-height: 300px;
      overflow-y: auto;
      text-align: left;
    }
    .notification-item {
      padding: 0.8rem;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .notification-item.unread {
      background: #fef9f0;
    }
    .confetti-piece { /* ... как раньше ... */ }
    .balloon { /* ... как раньше ... */ }
    .pop-particle { /* ... как раньше ... */ }
    @keyframes confettiBurst { /* ... */ }
    @keyframes balloonRise { /* ... */ }
    @keyframes popOut { /* ... */ }
  </style>
</head>
<body>
  <div class="music-bg">
    <div class="note" style="top:10%; left:5%; animation-delay:0s;"></div>
    <div class="note two" style="top:25%; right:10%; animation-delay:2s;"></div>
    <div class="note three" style="bottom:20%; left:15%; animation-delay:4s;"></div>
    <div class="clef" style="top:60%; left:50%; transform:translateX(-50%);"></div>
  </div>

  <div class="container">
    <div class="header">
      <a href="index.html" class="back-link">← На главную</a>
      <h1>Планировщик</h1>
      <div style="display:flex; gap:0.5rem; align-items:center;">
        <button class="btn" id="addIdeaBtn">Новая идея</button>
        <button class="btn" id="addTaskBtn">Новая задача</button>
        <div class="bell-icon" id="bellIcon">
          <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
          <span class="bell-badge" id="bellBadge" style="display:none;">0</span>
        </div>
      </div>
    </div>

    <div class="filters" id="filters">
      <button class="filter-btn active" data-status="all">Все</button>
      <button class="filter-btn" data-status="in_progress">В работе</button>
      <button class="filter-btn" data-status="clarifying">Уточняю</button>
      <button class="filter-btn" data-status="need_help">Нужна помощь</button>
      <button class="filter-btn" data-status="completed">Выполнено</button>
      <div class="employee-filter-wrap">
        <button class="employee-filter-btn" id="employeeFilterBtn">
          Сотрудник
          <span style="font-size:0.7rem;">▼</span>
        </button>
        <div class="employee-filter-dropdown" id="employeeFilterDropdown">
          <select id="employeeFilter" size="5">
            <option value="">Все</option>
          </select>
        </div>
      </div>
    </div>

    <div id="tasksContainer" class="tasks-grid"></div>
  </div>

  <!-- Модалка задачи -->
  <div class="modal-overlay" id="taskModal" style="display:none;">
    <div class="modal">
      <h2 id="modalTitle">Новая задача</h2>
      <input type="text" id="taskTitle" placeholder="Название задачи">
      <textarea id="taskDescription" rows="3" placeholder="Описание задачи"></textarea>
      <div id="prioritySection" style="display:block;">
        <label for="taskPriority" style="font-weight:600;">Приоритет:</label>
        <select id="taskPriority">
          <option value="low">Низкий</option>
          <option value="medium" selected>Средний</option>
          <option value="high">Срочный</option>
          <option value="critical">Суперсрочный</option>
        </select>
      </div>
      <label style="font-weight:600;">Ответственные:</label>
      <select id="taskAssigned" multiple style="height:auto; min-height:80px;"></select>
      <label for="taskDueDate" style="font-weight:600;">Дата завершения:</label>
      <input type="date" id="taskDueDate">
      <select id="taskStatus">
        <option value="in_progress">В работе</option>
        <option value="clarifying">Уточняю детали</option>
        <option value="need_help">Нужна помощь</option>
        <option value="completed">Выполнено</option>
      </select>
      <textarea id="taskComment" rows="2" placeholder="Комментарий"></textarea>
      <div style="display:flex; gap:0.5rem; margin-top:1rem;">
        <button class="btn btn-save" id="saveTaskBtn">Сохранить</button>
        <button class="btn btn-outline" id="cancelTaskBtn">Отмена</button>
        <button class="btn btn-outline" id="deleteTaskBtn" style="display:none;">Удалить</button>
      </div>
    </div>
  </div>

  <!-- Модалка помощи -->
  <div class="modal-overlay" id="helpModal" style="display:none;">
    <div class="modal">
      <h2>Предложить помощь</h2>
      <textarea id="helpComment" rows="3" placeholder="Ваше предложение или решение"></textarea>
      <button class="btn btn-save" id="sendHelpBtn">Отправить</button>
      <button class="btn btn-outline" id="cancelHelpBtn" style="margin-left:0.5rem;">Отмена</button>
    </div>
  </div>

  <!-- Модалка уведомлений -->
  <div class="modal-overlay" id="notificationsModal" style="display:none;">
    <div class="modal" style="max-width:400px;">
      <h2>Уведомления</h2>
      <div id="notificationsList" class="notifications-list"></div>
      <button class="btn btn-outline" id="closeNotificationsBtn" style="margin-top:1rem;">Закрыть</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ujsakubqnirmpdwmmtju.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqc2FrdWJxbmlybXBkd21tdGp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNDUwOTEsImV4cCI6MjA5ODgyMTA5MX0.8YZCsCpjroirJvKuQie76qXtpOvpmpE7dQoz2G502p4';
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const OWNER_EMAIL = 'arturgalkin.ru@mail.ru';
    let currentUserEmail = null;
    let employees = [];
    let tasks = [];
    let notifications = [];
    let currentFilter = 'all';
    let currentEmployeeFilter = '';

    const ALLOWED_ROLES = ['Управляющий', 'Менеджер', 'Администратор'];
    const SENIOR_TEACHER_NAME = 'Андрошин Сергей';

    (async () => {
      const { data: { session } } = await _supabase.auth.getSession();
      if (!session) { window.location.href = 'login.html'; return; }
      currentUserEmail = session.user.email;
      await loadEmployees();
      await loadTasks();
      await loadNotifications();
      renderFilters();
      renderTasks();
      updateBellBadge();
      checkOverdueTasks();
    })();

    async function loadEmployees() {
      const { data } = await _supabase.from('employees').select('*');
      employees = data || [];
      const allowed = employees.filter(e => 
        ALLOWED_ROLES.includes(e.role) || e.name === SENIOR_TEACHER_NAME
      );
      const assignSelect = document.getElementById('taskAssigned');
      assignSelect.innerHTML = allowed.map(e => `<option value="${e.id}">${e.name} (${e.role})</option>`).join('');
      const empFilter = document.getElementById('employeeFilter');
      empFilter.innerHTML = '<option value="">Все</option>' + allowed.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
    }

    async function loadTasks() {
      const { data, error } = await _supabase.from('tasks').select('*').order('created_at', { ascending: false });
      if (error) { console.error(error); return; }
      tasks = data || [];
    }

    async function loadNotifications() {
      const { data } = await _supabase.from('notifications').select('*').eq('user_email', currentUserEmail).order('created_at', { ascending: false });
      notifications = data || [];
    }

    function renderFilters() {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.status === currentFilter);
      });
    }

    function renderTasks() {
      const container = document.getElementById('tasksContainer');
      let filtered = tasks;
      if (currentFilter !== 'all') {
        filtered = filtered.filter(t => t.status === currentFilter);
      }
      if (currentEmployeeFilter) {
        filtered = filtered.filter(t => t.assignee_ids && t.assignee_ids.includes(currentEmployeeFilter));
      }

      if (!filtered.length) {
        container.innerHTML = '<p style="color:#636e72; text-align:center; width:100%;">Нет задач</p>';
        return;
      }

      container.innerHTML = filtered.map(task => {
        const assignees = (task.assignee_ids || []).map(id => employees.find(e => e.id === id)).filter(Boolean);
        const statusLabels = {
          in_progress: 'В работе',
          clarifying: 'Уточняю детали',
          need_help: 'Нужна помощь',
          completed: 'Выполнено'
        };
        const priorityLabels = {
          idea: 'Идея',
          low: 'Низкий',
          medium: 'Средний',
          high: 'Срочный',
          critical: 'Суперсрочно'
        };
        const priorityColors = {
          idea: 'var(--idea)',
          low: 'var(--low)',
          medium: 'var(--medium)',
          high: 'var(--high)',
          critical: 'var(--critical)'
        };
        const isOverdue = task.due_date && new Date(task.due_date) < new Date() && task.status !== 'completed';
        const isCriticalOverdue = isOverdue && task.priority === 'critical';
        const cardClasses = isCriticalOverdue ? ' task-card critical-overdue' : ' task-card';

        const isAssignee = task.assignee_ids?.some(id => employees.find(e => e.id === id)?.email === currentUserEmail);
        const isCreator = task.created_by === currentUserEmail;
        const canEdit = isCreator || isAssignee || currentUserEmail === OWNER_EMAIL;
        const canHelp = !isCreator && !isAssignee && task.status !== 'completed';

        return `
        <div class="${cardClasses}" data-id="${task.id}">
          <div class="help-indicator ${task.help_offered ? 'show' : ''}" title="Предложена помощь"></div>
          <div class="task-title">${task.title}</div>
          <div style="font-size:0.8rem; color:var(--text-light);">
            <span class="priority-dot" style="background:${priorityColors[task.priority]}"></span>${priorityLabels[task.priority]}
          </div>
          ${task.description ? `<div style="font-size:0.9rem; color:#444;">${task.description}</div>` : ''}
          <div class="task-meta">
            ${assignees.length ? `<span>${assignees.map(e => e.name).join(', ')}</span>` : '<span>Не назначен</span>'}
            <span>${task.due_date || '—'}</span>
          </div>
          <span class="badge ${task.status}">${statusLabels[task.status]}</span>
          ${task.help_offered && task.help_comment ? `<div style="font-style:italic; font-size:0.8rem; background:#fef9f0; padding:0.3rem; border-radius:8px;">Помощь: ${task.help_comment}</div>` : ''}
          ${task.comment ? `<div style="font-style:italic; font-size:0.8rem; background:#f0f0f0; padding:0.3rem; border-radius:8px;">${task.comment}</div>` : ''}
          <div style="display:flex; gap:0.3rem; margin-top:0.5rem; flex-wrap:wrap;">
            ${canEdit ? `<button class="btn btn-outline edit-btn" style="padding:0.3rem 0.8rem; font-size:0.8rem;" data-id="${task.id}">Изменить</button>` : ''}
            ${canHelp ? `<button class="btn btn-outline help-btn" style="padding:0.3rem 0.8rem; font-size:0.8rem;" data-id="${task.id}">Предложить помощь</button>` : ''}
            ${currentUserEmail === OWNER_EMAIL ? `<button class="btn btn-outline delete-btn" style="padding:0.3rem 0.8rem; font-size:0.8rem;" data-id="${task.id}">Удалить</button>` : ''}
          </div>
        </div>`;
      }).join('');

      document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = e.target.dataset.id;
          const task = tasks.find(t => t.id == id);
          if (task) openEditModal(task);
        });
      });
      document.querySelectorAll('.help-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = e.target.dataset.id;
          document.getElementById('helpModal').dataset.taskId = id;
          document.getElementById('helpModal').style.display = 'flex';
        });
      });
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const id = e.target.dataset.id;
          if (confirm('Удалить задачу?')) {
            await _supabase.from('tasks').delete().eq('id', id);
            showBalloonAndConfetti();
            await loadTasks();
            renderTasks();
          }
        });
      });
    }

    function checkOverdueTasks() {
      // Дополнительная визуализация уже есть
    }

    // Фильтры
    document.getElementById('filters').addEventListener('click', (e) => {
      if (e.target.classList.contains('filter-btn')) {
        currentFilter = e.target.dataset.status;
        renderFilters();
        renderTasks();
      }
    });

    document.getElementById('employeeFilter').addEventListener('change', (e) => {
      currentEmployeeFilter = e.target.value;
      document.getElementById('employeeFilterDropdown').style.display = 'none';
      renderTasks();
    });

    document.getElementById('employeeFilterBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      const dropdown = document.getElementById('employeeFilterDropdown');
      dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.employee-filter-wrap')) {
        document.getElementById('employeeFilterDropdown').style.display = 'none';
      }
    });

    // Открытие модалок создания
    document.getElementById('addIdeaBtn').addEventListener('click', () => openCreateModal('idea'));
    document.getElementById('addTaskBtn').addEventListener('click', () => openCreateModal('task'));

    function openCreateModal(type) {
      const modal = document.getElementById('taskModal');
      modal.dataset.taskId = '';
      document.getElementById('modalTitle').textContent = type === 'idea' ? 'Новая идея' : 'Новая задача';
      document.getElementById('taskTitle').value = '';
      document.getElementById('taskDescription').value = '';
      document.getElementById('taskAssigned').selectedIndex = -1;
      document.getElementById('taskDueDate').value = '';
      document.getElementById('taskStatus').value = 'in_progress';
      document.getElementById('taskComment').value = '';
      document.getElementById('deleteTaskBtn').style.display = 'none';
      const prioritySection = document.getElementById('prioritySection');
      if (type === 'idea') {
        prioritySection.style.display = 'none';
        document.getElementById('taskPriority').value = 'idea';
      } else {
        prioritySection.style.display = 'block';
        document.getElementById('taskPriority').value = 'medium';
      }
      modal.style.display = 'flex';
    }

    // Закрытие модалок
    document.getElementById('cancelTaskBtn').addEventListener('click', () => {
      document.getElementById('taskModal').style.display = 'none';
    });
    document.getElementById('cancelHelpBtn').addEventListener('click', () => {
      document.getElementById('helpModal').style.display = 'none';
    });
    document.getElementById('closeNotificationsBtn').addEventListener('click', () => {
      document.getElementById('notificationsModal').style.display = 'none';
    });

    // Сохранение задачи
    document.getElementById('saveTaskBtn').addEventListener('click', async () => {
      const title = document.getElementById('taskTitle').value.trim();
      if (!title) return alert('Введите название задачи');
      const modal = document.getElementById('taskModal');
      const taskId = modal.dataset.taskId;
      const isIdea = document.getElementById('modalTitle').textContent.includes('Идея');
      const assignedSelect = document.getElementById('taskAssigned');
      const assigneeIds = Array.from(assignedSelect.selectedOptions).map(o => o.value);

      const taskData = {
        title,
        description: document.getElementById('taskDescription').value.trim(),
        assignee_ids: assigneeIds,
        due_date: document.getElementById('taskDueDate').value || null,
        status: document.getElementById('taskStatus').value,
        comment: document.getElementById('taskComment').value.trim(),
        priority: isIdea ? 'idea' : document.getElementById('taskPriority').value,
        created_by: currentUserEmail
      };

      let error;
      if (taskId) {
        const { error: updateError } = await _supabase.from('tasks').update(taskData).eq('id', taskId);
        error = updateError;
        // Если статус изменился на completed, уведомить остальных ответственных
        if (taskData.status === 'completed' && taskId) {
          const originalTask = tasks.find(t => t.id == taskId);
          if (originalTask && originalTask.status !== 'completed') {
            await notifyOtherAssignees(taskId, assigneeIds);
          }
        }
      } else {
        const { error: insertError } = await _supabase.from('tasks').insert([taskData]);
        error = insertError;
      }

      if (error) { alert('Ошибка: ' + error.message); return; }
      document.getElementById('taskModal').style.display = 'none';
      showBalloonAndConfetti();
      await loadTasks();
      renderTasks();
    });

    async function notifyOtherAssignees(taskId, assigneeIds) {
      const currentUserEmployees = employees.filter(e => assigneeIds.includes(e.id) && e.email !== currentUserEmail);
      for (const emp of currentUserEmployees) {
        if (emp.email) {
          await _supabase.from('notifications').insert([{
            task_id: taskId,
            user_email: emp.email,
            message: `Задача «${document.getElementById('taskTitle').value}» была завершена пользователем ${currentUserEmail}.`,
          }]);
        }
      }
    }

    // Удаление задачи (управляющим)
    document.getElementById('deleteTaskBtn').addEventListener('click', async () => {
      const taskId = document.getElementById('taskModal').dataset.taskId;
      if (!taskId) return;
      if (confirm('Удалить задачу?')) {
        await _supabase.from('tasks').delete().eq('id', taskId);
        document.getElementById('taskModal').style.display = 'none';
        showBalloonAndConfetti();
        await loadTasks();
        renderTasks();
      }
    });

    function openEditModal(task) {
      const modal = document.getElementById('taskModal');
      modal.dataset.taskId = task.id;
      document.getElementById('modalTitle').textContent = task.priority === 'idea' ? 'Редактирование идеи' : 'Редактирование задачи';
      document.getElementById('taskTitle').value = task.title;
      document.getElementById('taskDescription').value = task.description || '';
      const assignSelect = document.getElementById('taskAssigned');
      for (let i = 0; i < assignSelect.options.length; i++) {
        assignSelect.options[i].selected = (task.assignee_ids || []).includes(assignSelect.options[i].value);
      }
      document.getElementById('taskDueDate').value = task.due_date || '';
      document.getElementById('taskStatus').value = task.status;
      document.getElementById('taskComment').value = task.comment || '';
      const prioritySection = document.getElementById('prioritySection');
      if (task.priority === 'idea') {
        prioritySection.style.display = 'none';
      } else {
        prioritySection.style.display = 'block';
        document.getElementById('taskPriority').value = task.priority || 'medium';
      }
      document.getElementById('deleteTaskBtn').style.display = (currentUserEmail === OWNER_EMAIL) ? 'inline-block' : 'none';
      modal.style.display = 'flex';
    }

    // Помощь
    document.getElementById('sendHelpBtn').addEventListener('click', async () => {
      const taskId = document.getElementById('helpModal').dataset.taskId;
      const comment = document.getElementById('helpComment').value.trim();
      if (!comment) return alert('Введите комментарий');
      const { error } = await _supabase.from('tasks').update({
        help_offered: true,
        help_comment: comment,
        help_by: currentUserEmail
      }).eq('id', taskId);
      if (error) { alert('Ошибка: ' + error.message); return; }
      document.getElementById('helpModal').style.display = 'none';
      document.getElementById('helpComment').value = '';
      showBalloonAndConfetti();
      await loadTasks();
      renderTasks();
    });

    // Уведомления (колокольчик)
    document.getElementById('bellIcon').addEventListener('click', async () => {
      await loadNotifications();
      const list = document.getElementById('notificationsList');
      if (notifications.length === 0) {
        list.innerHTML = '<p>Нет новых уведомлений</p>';
      } else {
        list.innerHTML = notifications.map(n => `
          <div class="notification-item ${n.is_read ? '' : 'unread'}">
            <span style="flex:1;">${n.message} <small>${new Date(n.created_at).toLocaleString()}</small></span>
            ${!n.is_read ? `<button class="btn btn-outline mark-read" data-id="${n.id}" style="padding:0.2rem 0.5rem; font-size:0.7rem;">Прочитано</button>` : ''}
          </div>
        `).join('');
        document.querySelectorAll('.mark-read').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const id = e.target.dataset.id;
            await _supabase.from('notifications').update({ is_read: true }).eq('id', id);
            await loadNotifications();
            updateBellBadge();
            document.getElementById('notificationsModal').style.display = 'none'; // или обновить список
          });
        });
      }
      document.getElementById('notificationsModal').style.display = 'flex';
    });

    async function updateBellBadge() {
      const { count } = await _supabase.from('notifications').select('*', { count: 'exact', head: true }).eq('user_email', currentUserEmail).eq('is_read', false);
      const badge = document.getElementById('bellBadge');
      if (count > 0) {
        badge.textContent = count;
        badge.style.display = 'flex';
      } else {
        badge.style.display = 'none';
      }
    }

    // Анимации успеха (без изменений)
    function showBalloonAndConfetti() {
      const balloon = document.createElement('div');
      balloon.className = 'balloon';
      document.body.appendChild(balloon);
      balloon.addEventListener('animationend', () => {
        balloon.remove();
        createConfetti();
        createPopParticles();
      });
    }
    function createConfetti() {
      const colors = ['#ff4d6d','#f9ca24','#55efc4','#a29bfe','#ff9a9e','#43e97b'];
      for (let i = 0; i < 40; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.left = '50%';
        piece.style.top = '30%';
        piece.style.setProperty('--x', (Math.random()*300-150)+'px');
        piece.style.setProperty('--y', (Math.random()*-200-50)+'px');
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 800);
      }
    }
    function createPopParticles() {
      for (let i=0; i<10; i++) {
        const p = document.createElement('div');
        p.className = 'pop-particle';
        p.style.left = '50%';
        p.style.top = '30%';
        p.style.setProperty('--px', (Math.random()*80-40)+'px');
        p.style.setProperty('--py', (Math.random()*80-40)+'px');
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 500);
      }
    }
  </script>
</body>
</html>
