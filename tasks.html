<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>Управление задачами — Music Club Орёл</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #ff4d6d;
      --accent2: #f9ca24;
      --accent3: #6c5ce7;
      --bg: #fef9f0;
      --surface: rgba(255,255,255,0.85);
      --text: #2d3436;
      --text-light: #636e72;
      --border: #e0e0e0;
      --critical: #e74c3c;
      --high: #f39c12;
      --medium: #3498db;
      --low: #2ecc71;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, .container, .task-card, .modal, .filters, .header {
      -webkit-user-select: none; -moz-user-select: none; user-select: none;
      cursor: default;
    }
    input, textarea {
      -webkit-user-select: text; -moz-user-select: text; user-select: text;
      cursor: text;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #ffe0f0 0%, #fefce8 50%, #e0f0ff 100%);
      color: var(--text);
      padding: 1.5rem;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      position: relative;
      overflow-x: hidden;
    }
    .music-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .note {
      position: absolute;
      font-size: 2rem;
      color: rgba(255,77,109,0.12);
      animation: floatNote 10s infinite ease-in-out;
    }
    .note::before { content: '♪'; }
    .note.two::before { content: '♫'; }
    .note.three::before { content: '♩'; }
    .clef {
      position: absolute;
      font-size: 5rem;
      color: rgba(249,202,36,0.12);
      animation: pulse 6s infinite;
    }
    .clef::before { content: '𝄞'; }
    @keyframes floatNote {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.5; }
      50% { transform: translateY(-25px) rotate(5deg); opacity: 0.9; }
      100% { transform: translateY(0) rotate(0deg); opacity: 0.5; }
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.15); opacity: 0.8; }
      100% { transform: scale(1); opacity: 0.4; }
    }

    .container {
      position: relative; z-index: 2;
      width: 100%; max-width: 1200px;
      background: var(--surface);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      border: 1px solid rgba(255,255,255,0.6);
    }
    .header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;
    }
    .back-link { color: var(--accent); text-decoration: none; font-weight: 600; font-size: 0.9rem; }
    h1 { font-size: 2rem; font-weight: 700; color: var(--accent); }

    /* Вкладки Идеи / Задачи */
    .tabs {
      display: flex; gap: 1rem; margin-bottom: 1.5rem;
    }
    .tab {
      padding: 0.6rem 2rem; border-radius: 20px;
      border: 2px solid var(--border);
      background: white; cursor: pointer;
      font-weight: 600; font-size: 1rem; color: var(--text-light);
      transition: all 0.3s;
    }
    .tab.active {
      background: var(--accent); color: white; border-color: var(--accent);
    }
    .tab:hover:not(.active) {
      border-color: var(--accent); color: var(--accent);
    }

    /* Кнопка создать */
    .btn {
      border: none; padding: 0.6rem 1.5rem; border-radius: 16px;
      font-weight: 600; cursor: pointer; font-size: 0.95rem;
      transition: all 0.3s; display: inline-flex; align-items: center; gap: 0.4rem;
      background: linear-gradient(135deg, #ff4d6d, #f9ca24);
      color: white; box-shadow: 0 6px 12px rgba(255,77,109,0.3);
    }
    .btn:hover { box-shadow: 0 10px 20px rgba(255,77,109,0.5); transform: translateY(-2px); }
    .btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--accent); }
    .btn-outline:hover { background: var(--accent); color: white; }
    .btn:disabled { opacity: 0.5; cursor: default; }

    /* Фильтры */
    .filters {
      display: flex; gap: 0.8rem; flex-wrap: wrap;
      margin-bottom: 1.5rem; align-items: center;
    }
    .filter-btn {
      padding: 0.4rem 1.2rem; border-radius: 20px;
      border: 1px solid var(--border); background: white;
      cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: 0.2s;
    }
    .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    /* Кастомный фильтр по сотрудникам */
    .emp-filter-wrap {
      position: relative;
    }
    .emp-filter-btn {
      padding: 0.4rem 1.5rem 0.4rem 1rem; border-radius: 20px;
      border: 1px solid var(--border); background: white;
      cursor: pointer; font-size: 0.85rem; font-weight: 500;
      display: flex; align-items: center; gap: 0.5rem;
      transition: 0.2s; white-space: nowrap;
    }
    .emp-filter-btn:hover { border-color: var(--accent); }
    .emp-filter-btn::after {
      content: '▼'; font-size: 0.6rem; color: var(--text-light);
    }
    .emp-dropdown {
      position: absolute; top: 100%; left: 0; margin-top: 4px;
      background: white; border: 1px solid var(--border);
      border-radius: 14px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      z-index: 20; min-width: 220px; display: none;
      padding: 0.5rem; animation: fadeIn 0.2s ease;
    }
    .emp-dropdown.open { display: block; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .emp-dropdown-item {
      padding: 0.4rem 0.8rem; cursor: pointer;
      border-radius: 8px; font-size: 0.85rem; transition: 0.1s;
    }
    .emp-dropdown-item:hover { background: #ffe0e0; }
    .emp-dropdown-item.active { background: var(--accent); color: white; }

    .tasks-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 1rem;
    }
    .task-card {
      background: white; border: 2px solid #ffe0e0;
      border-radius: 20px; padding: 1.2rem;
      box-shadow: 0 6px 15px rgba(0,0,0,0.03);
      transition: all 0.3s; display: flex; flex-direction: column; gap: 0.5rem;
      position: relative; overflow: hidden;
    }
    .task-card:hover { border-color: var(--accent); box-shadow: 0 12px 25px rgba(255,77,109,0.15); transform: translateY(-3px); }
    .task-card.critical-overdue {
      animation: shake 0.5s infinite, glowRed 1s infinite alternate;
      border-color: var(--critical);
    }
    @keyframes shake {
      0% { transform: translateX(0); } 25% { transform: translateX(-3px); } 50% { transform: translateX(3px); } 75% { transform: translateX(-3px); } 100% { transform: translateX(0); }
    }
    @keyframes glowRed {
      0% { box-shadow: 0 0 5px red; } 100% { box-shadow: 0 0 20px red; }
    }
    .task-title { font-weight: 700; font-size: 1.1rem; color: #2d3436; }
    .task-meta { font-size: 0.8rem; color: var(--text-light); display: flex; gap: 1rem; flex-wrap: wrap; }
    .badge {
      display: inline-block; padding: 0.25rem 0.7rem; border-radius: 12px;
      font-size: 0.7rem; font-weight: 600; align-self: flex-start;
    }
    .badge.in_progress { background: #d1fae5; color: #065f46; }
    .badge.clarifying { background: #fef3c7; color: #92400e; }
    .badge.need_help { background: #fee2e2; color: #991b1b; }
    .badge.completed { background: #e0e7ff; color: #3730a3; }
    .priority-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 0.3rem; }
    .help-indicator {
      position: absolute; top: -5px; right: -5px;
      width: 20px; height: 20px; border-radius: 50%;
      background: #f9ca24; animation: pulse 1.5s infinite;
      display: none; z-index: 3;
    }
    .help-indicator.show { display: block; }
    @keyframes pulse {
      0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); }
    }
    .text-collapsed {
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; cursor: pointer; transition: all 0.3s;
    }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px); display: flex;
      align-items: center; justify-content: center; z-index: 1000;
    }
    .modal {
      background: white; border-radius: 24px; padding: 2rem;
      max-width: 500px; width: 90%;
      box-shadow: 0 25px 50px rgba(0,0,0,0.15);
      animation: slideUp 0.2s ease-out;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); }
    }
    input, textarea, select {
      width: 100%; padding: 0.6rem; margin: 0.5rem 0;
      border: 1px solid var(--border); border-radius: 10px;
      font-size: 0.9rem; font-family: inherit;
    }
    .multi-select { position: relative; margin: 0.5rem 0; }
    .multi-select-trigger {
      padding: 0.6rem; border: 1px solid var(--border);
      border-radius: 10px; background: white; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      min-height: 42px; font-size: 0.9rem; color: var(--text);
      transition: border-color 0.2s;
    }
    .multi-select-trigger:hover { border-color: var(--accent); }
    .multi-select-dropdown {
      position: absolute; top: 100%; left: 0; right: 0;
      background: white; border: 1px solid var(--border);
      border-radius: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      z-index: 10; display: none; max-height: 200px; overflow-y: auto;
    }
    .multi-select-dropdown.open { display: block; }
    .multi-select-item {
      padding: 0.5rem 0.8rem; cursor: pointer; display: flex; align-items: center; gap: 0.5rem;
      border-bottom: 1px solid #f0f0f0; font-size: 0.9rem;
    }
    .multi-select-item:hover { background: #ffe0e0; }
    .multi-select-item input[type="checkbox"] { accent-color: var(--accent); width: 16px; height: 16px; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="music-bg">
    <div class="note" style="top:10%; left:5%;"></div>
    <div class="note two" style="top:25%; right:10%;"></div>
    <div class="note three" style="bottom:20%; left:15%;"></div>
    <div class="clef" style="top:60%; left:50%;"></div>
  </div>

  <div class="container">
    <div class="header">
      <a href="index.html" class="back-link">← На главную</a>
      <h1>Управление задачами</h1>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="idea">Идеи</div>
      <div class="tab" data-tab="task">Задачи</div>
      <button class="btn" id="addBtn" style="margin-left:auto;">+ Новая идея</button>
    </div>

    <div class="filters">
      <div class="emp-filter-wrap" id="empFilterWrap">
        <div class="emp-filter-btn" id="empFilterBtn">Все сотрудники</div>
        <div class="emp-dropdown" id="empDropdown">
          <div class="emp-dropdown-item active" data-id="">Все сотрудники</div>
        </div>
      </div>
      <div id="statusFilters" style="display:none;">
        <button class="filter-btn active" data-status="all">Все</button>
        <button class="filter-btn" data-status="in_progress">В работе</button>
        <button class="filter-btn" data-status="clarifying">Уточняю</button>
        <button class="filter-btn" data-status="need_help">Нужна помощь</button>
        <button class="filter-btn" data-status="completed">Выполнено</button>
      </div>
    </div>

    <div id="tasksContainer" class="tasks-grid"></div>
  </div>

  <!-- Модалка задачи/идеи -->
  <div class="modal-overlay" id="taskModal" style="display:none;">
    <div class="modal">
      <h2 id="modalTitle">Новая задача</h2>
      <input type="text" id="taskTitle" placeholder="Название">
      <textarea id="taskDescription" rows="3" placeholder="Описание"></textarea>
      <div id="ideaFields" style="display:none;">
        <select id="ideaType">
          <option value="super">Суперидея</option>
          <option value="think">На подумать</option>
          <option value="future">На будущее</option>
        </select>
      </div>
      <div id="taskFields">
        <select id="taskPriority">
          <option value="low">Низкий</option>
          <option value="medium" selected>Средний</option>
          <option value="high">Срочный</option>
          <option value="critical">Суперсрочный</option>
        </select>
        <div class="multi-select" id="multiSelect">
          <div class="multi-select-trigger" id="multiTrigger">Выберите ответственных</div>
          <div class="multi-select-dropdown" id="multiDropdown"></div>
        </div>
        <input type="date" id="taskDueDate">
        <select id="taskStatus">
          <option value="in_progress">В работе</option>
          <option value="clarifying">Уточняю</option>
          <option value="need_help">Нужна помощь</option>
          <option value="completed">Выполнено</option>
        </select>
      </div>
      <textarea id="taskComment" rows="2" placeholder="Комментарий"></textarea>
      <div style="display:flex; gap:0.5rem; margin-top:1rem;">
        <button class="btn" id="saveTaskBtn">Сохранить</button>
        <button class="btn btn-outline" id="cancelTaskBtn">Отмена</button>
        <button class="btn btn-outline" id="deleteTaskBtn" style="display:none;">Удалить</button>
      </div>
    </div>
  </div>

  <!-- Модалка помощи -->
  <div class="modal-overlay" id="helpModal" style="display:none;">
    <div class="modal">
      <h2>Предложить помощь</h2>
      <textarea id="helpComment" rows="3" placeholder="Ваше предложение"></textarea>
      <button class="btn" id="sendHelpBtn">Отправить</button>
      <button class="btn btn-outline" id="cancelHelpBtn" style="margin-left:0.5rem;">Отмена</button>
    </div>
  </div>

  <script>
    (function() {
      const SUPABASE_URL = 'https://ujsakubqnirmpdwmmtju.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqc2FrdWJxbmlybXBkd21tdGp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNDUwOTEsImV4cCI6MjA5ODgyMTA5MX0.8YZCsCpjroirJvKuQie76qXtpOvpmpE7dQoz2G502p4';
      const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      const OWNER_EMAIL = 'arturgalkin.ru@mail.ru';
      let currentUserEmail = null;
      let employees = [];
      let tasks = [];
      let activeTab = 'idea';
      let currentStatusFilter = 'all';
      let currentEmployeeFilter = '';

      function getEl(id) { return document.getElementById(id); }

      async function loadData() {
        await Promise.all([loadEmployees(), loadTasks()]);
        renderEmpDropdown();
        renderAll();
      }

      async function loadEmployees() {
        const { data } = await _supabase.from('employees').select('*');
        employees = (data || []).filter(e => ['Управляющий','Менеджер','Администратор'].includes(e.role) || e.name === 'Андрошин Сергей');
      }

      async function loadTasks() {
        const { data } = await _supabase.from('tasks').select('*').order('created_at', { ascending: false });
        tasks = data || [];
      }

      function renderEmpDropdown() {
        const dropdown = getEl('empDropdown');
        dropdown.innerHTML = `
          <div class="emp-dropdown-item ${currentEmployeeFilter === '' ? 'active' : ''}" data-id="">Все сотрудники</div>
          ${employees.map(e => `<div class="emp-dropdown-item ${currentEmployeeFilter === e.id ? 'active' : ''}" data-id="${e.id}">${e.name}</div>`).join('')}
        `;
        dropdown.querySelectorAll('.emp-dropdown-item').forEach(item => {
          item.addEventListener('click', () => {
            currentEmployeeFilter = item.dataset.id;
            getEl('empFilterBtn').textContent = item.textContent.trim();
            dropdown.classList.remove('open');
            renderEmpDropdown();
            renderAll();
          });
        });
      }

      function renderAll() {
        const isIdea = activeTab === 'idea';
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === activeTab));
        getEl('addBtn').textContent = isIdea ? '+ Новая идея' : '+ Новая задача';
        getEl('statusFilters').style.display = isIdea ? 'none' : 'flex';

        const container = getEl('tasksContainer');
        let filtered = tasks.filter(t => {
          if (isIdea) return ['super','think','future'].includes(t.priority);
          return !['super','think','future'].includes(t.priority);
        });
        if (!isIdea) {
          if (currentStatusFilter !== 'all') filtered = filtered.filter(t => t.status === currentStatusFilter);
          if (currentEmployeeFilter) filtered = filtered.filter(t => (t.assignee_ids || []).includes(currentEmployeeFilter));
        } else {
          if (currentEmployeeFilter) filtered = filtered.filter(t => t.created_by === employees.find(e => e.id === currentEmployeeFilter)?.email);
        }

        if (!filtered.length) {
          container.innerHTML = '<p style="color:#636e72; text-align:center; width:100%;">Нет записей</p>';
          return;
        }

        container.innerHTML = filtered.map(task => {
          const assigneeNames = (task.assignee_ids || []).map(id => employees.find(e => e.id === id)?.name).filter(Boolean).join(', ') || '—';
          const priorityLabels = { super:'Суперидея', think:'На подумать', future:'На будущее', low:'Низкий', medium:'Средний', high:'Срочный', critical:'Суперсрочно' };
          const priorityColors = { super:'#f39c12', think:'#3498db', future:'#2ecc71', low:'#2ecc71', medium:'#3498db', high:'#f39c12', critical:'var(--critical)' };
          const statusLabels = { in_progress:'В работе', clarifying:'Уточняю', need_help:'Нужна помощь', completed:'Выполнено' };
          const isCriticalOverdue = task.due_date && new Date(task.due_date) < new Date() && task.status !== 'completed' && task.priority === 'critical';
          const cardClass = isCriticalOverdue ? ' task-card critical-overdue' : ' task-card';

          return `<div class="${cardClass}" data-id="${task.id}">
            <div class="help-indicator ${task.help_offered ? 'show' : ''}"></div>
            <div class="task-title">${task.title}</div>
            <div><span class="priority-dot" style="background:${priorityColors[task.priority] || '#9b59b6'}"></span>${priorityLabels[task.priority] || task.priority}</div>
            ${task.description ? `<div class="text-collapsed task-desc">${task.description}</div>` : ''}
            <div class="task-meta"><span>${assigneeNames}</span><span>${task.due_date || '—'}</span></div>
            ${!isIdea ? `<span class="badge ${task.status}">${statusLabels[task.status]}</span>` : ''}
            ${task.help_offered && task.help_comment ? `<div class="text-collapsed task-help">${task.help_comment}</div>` : ''}
            ${task.comment ? `<div class="text-collapsed task-comment">${task.comment}</div>` : ''}
            <div style="display:flex; gap:0.3rem; margin-top:0.5rem;">
              <button class="btn btn-outline edit-btn" data-id="${task.id}" style="padding:0.3rem 0.8rem; font-size:0.8rem;">Изменить</button>
              <button class="btn btn-outline help-btn" data-id="${task.id}" style="padding:0.3rem 0.8rem; font-size:0.8rem;">Предложить помощь</button>
              ${currentUserEmail === OWNER_EMAIL ? `<button class="btn btn-outline delete-btn" data-id="${task.id}" style="padding:0.3rem 0.8rem; font-size:0.8rem;">Удалить</button>` : ''}
            </div>
          </div>`;
        }).join('');

        container.addEventListener('click', (e) => {
          const t = e.target;
          if (t.classList.contains('text-collapsed')) t.classList.toggle('text-collapsed');
          if (t.classList.contains('edit-btn')) openEditModal(t.dataset.id);
          if (t.classList.contains('help-btn')) openHelpModal(t.dataset.id);
          if (t.classList.contains('delete-btn') && confirm('Удалить?')) {
            _supabase.from('tasks').delete().eq('id', t.dataset.id).then(() => loadData().then(renderAll));
          }
        });
      }

      function openEditModal(id) {
        const task = tasks.find(t => t.id == id);
        if (!task) return;
        getEl('modalTitle').textContent = 'Редактирование';
        getEl('taskTitle').value = task.title;
        getEl('taskDescription').value = task.description || '';
        getEl('taskComment').value = task.comment || '';
        const isIdea = ['super','think','future'].includes(task.priority);
        getEl('ideaFields').style.display = isIdea ? 'block' : 'none';
        getEl('taskFields').style.display = isIdea ? 'none' : 'block';
        if (isIdea) {
          getEl('ideaType').value = task.priority;
        } else {
          getEl('taskPriority').value = task.priority;
          getEl('taskDueDate').value = task.due_date || '';
          getEl('taskStatus').value = task.status;
          document.querySelectorAll('#multiDropdown input[type="checkbox"]').forEach(cb => cb.checked = (task.assignee_ids||[]).includes(cb.value));
        }
        getEl('taskModal').dataset.taskId = id;
        getEl('taskModal').style.display = 'flex';
      }

      getEl('saveTaskBtn').addEventListener('click', async () => {
        const isIdea = activeTab === 'idea';
        const title = getEl('taskTitle').value.trim();
        if (!title) return;
        const taskData = {
          title,
          description: getEl('taskDescription').value.trim(),
          comment: getEl('taskComment').value.trim(),
          priority: isIdea ? getEl('ideaType').value : getEl('taskPriority').value,
          assignee_ids: isIdea ? [] : [...document.querySelectorAll('#multiDropdown input:checked')].map(cb => cb.value),
          due_date: isIdea ? null : (getEl('taskDueDate').value || null),
          status: isIdea ? 'in_progress' : getEl('taskStatus').value,
          created_by: currentUserEmail
        };
        const id = getEl('taskModal').dataset.taskId;
        const { error } = id ? await _supabase.from('tasks').update(taskData).eq('id', id) : await _supabase.from('tasks').insert([taskData]);
        if (error) { alert(error.message); return; }
        getEl('taskModal').style.display = 'none';
        showBalloonAndConfetti();
        await loadData();
        renderAll();
      });

      // Инициализация
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => { activeTab = tab.dataset.tab; renderAll(); });
      });
      getEl('addBtn').addEventListener('click', () => {
        activeTab = document.querySelector('.tab.active').dataset.tab;
        getEl('taskTitle').value = '';
        getEl('taskDescription').value = '';
        getEl('taskComment').value = '';
        const isIdea = activeTab === 'idea';
        getEl('ideaFields').style.display = isIdea ? 'block' : 'none';
        getEl('taskFields').style.display = isIdea ? 'none' : 'block';
        getEl('modalTitle').textContent = isIdea ? 'Новая идея' : 'Новая задача';
        delete getEl('taskModal').dataset.taskId;
        getEl('taskModal').style.display = 'flex';
      });
      getEl('cancelTaskBtn').addEventListener('click', () => getEl('taskModal').style.display = 'none');

      getEl('empFilterBtn').addEventListener('click', () => getEl('empDropdown').classList.toggle('open'));
      document.addEventListener('click', (e) => { if (!e.target.closest('#empFilterWrap')) getEl('empDropdown').classList.remove('open'); });

      // Анимация
      function showBalloonAndConfetti() {
        const balloon = document.createElement('div'); balloon.className = 'balloon'; document.body.appendChild(balloon);
        balloon.addEventListener('animationend', () => { balloon.remove(); createConfetti(); });
      }
      function createConfetti() {
        for (let i=0;i<50;i++) { const p=document.createElement('div'); p.className='confetti-piece'; p.style.background=['#ff4d6d','#f9ca24','#6c5ce7','#55efc4','#3498db'][i%5]; p.style.left='50%'; p.style.top='30%'; p.style.setProperty('--x',(Math.random()*300-150)+'px'); p.style.setProperty('--y',(Math.random()*-200-50)+'px'); document.body.appendChild(p); setTimeout(()=>p.remove(),800); }
      }

      (async () => {
        const { data: { session } } = await _supabase.auth.getSession();
        if (!session) { window.location.href = 'login.html'; return; }
        currentUserEmail = session.user.email;
        await loadData();
      })();
    })();
  </script>
</body>
</html>
