<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Club Орёл — Платформа управления</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --surface: #ffffff;
      --text: #2d3436;
      --text-secondary: #636e72;
      --border: #e2e8f0;
      --accent: #ff6b6b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #fff5f5 0%, #fefce8 50%, #f0f9ff 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }
    .container {
      width: 100%;
      max-width: 900px;
      position: relative;
    }
    .user-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .user-bar span { font-weight: 500; color: var(--text-secondary); }
    .btn-logout {
      background: none;
      border: 1px solid var(--border);
      padding: 0.4rem 1rem;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 500;
    }
    .btn-logout:hover { background: #fff0f0; }
    h1 {
      text-align: center;
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .subtitle { text-align: center; color: var(--text-secondary); margin-bottom: 3rem; }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
    }
    .card {
      background: var(--surface);
      border-radius: 24px;
      padding: 2rem;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: -20px; right: -20px;
      width: 80px; height: 80px;
      border-radius: 50%;
      opacity: 0.15;
      transition: all 0.3s ease;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }
    .card:hover::before {
      width: 120px; height: 120px;
      opacity: 0.25;
    }
    .card.schedule::before { background: linear-gradient(135deg, #ff9a9e, #fad0c4); }
    .card.tasks::before { background: linear-gradient(135deg, #a1c4fd, #c2e9fb); }
    .card.contests::before { background: linear-gradient(135deg, #43e97b, #38f9d7); }
    .card.nps::before { background: linear-gradient(135deg, #fbc2eb, #a6c1ee); }
    .card-icon { margin-bottom: 1rem; }
    .card h2 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    .card p { color: var(--text-secondary); font-size: 0.9rem; }
    .coming-soon { opacity: 0.7; }
    .coming-soon .card-icon { filter: grayscale(0.2); }
  </style>
</head>
<body>
  <div class="container">
    <div class="user-bar" id="userBar">
      <span id="userEmail"></span>
      <button class="btn-logout" id="logoutBtn">Выйти</button>
    </div>
    <h1>Music Club Орёл</h1>
    <p class="subtitle">Платформа управления музыкальной школой</p>
    <div class="cards">
      <a href="schedule.html" class="card schedule">
        <div class="card-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ff6b6b" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
        <h2>График работы</h2>
        <p>Расписание, зарплата, сотрудники</p>
      </a>
      <a href="tasks.html" class="card tasks">
        <div class="card-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg>
        </div>
        <h2>Управление задачами</h2>
        <p>Идеи и планы</p>
      </a>
      <a href="contests.html" class="card contests coming-soon">
        <div class="card-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#2ed573" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5C7 4 7.5 5.5 7.5 7.5a2.5 2.5 0 0 1 0 5H6Z"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5C18 4 17.5 5.5 17.5 7.5a2.5 2.5 0 0 0 0 5H18Z"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
        </div>
        <h2>Конкурсы</h2>
        <p>Скоро открытие</p>
      </a>
      <a href="nps.html" class="card nps">
        <div class="card-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#a29bfe" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14Z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>
        </div>
        <h2>NPS / Отзывы</h2>
        <p>Сбор обратной связи</p>
      </a>
    </div>
  </div>
  <script>
    const SUPABASE_URL = 'https://ujsakubqnirmpdwmmtju.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqc2FrdWJxbmlybXBkd21tdGp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNDUwOTEsImV4cCI6MjA5ODgyMTA5MX0.8YZCsCpjroirJvKuQie76qXtpOvpmpE7dQoz2G502p4';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { window.location.href = 'login.html'; return; }
      document.getElementById('userEmail').textContent = session.user.email;
      document.getElementById('logoutBtn').addEventListener('click', async () => {
        await supabase.auth.signOut();
        window.location.href = 'login.html';
      });
    })();
  </script>
</body>
</html>
