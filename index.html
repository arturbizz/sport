<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Club Орёл — Платформа управления</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1a0a2e;
      --surface: rgba(255,255,255,0.1);
      --text: #f0e6ff;
      --accent: #ff4d6d;
      --accent2: #f9ca24;
      --gradient1: linear-gradient(135deg, #ff4d6d, #ff6b6b);
      --gradient2: linear-gradient(135deg, #a29bfe, #6c5ce7);
      --gradient3: linear-gradient(135deg, #55efc4, #00b894);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 20% 30%, #2d1b4e, #1a0a2e 70%);
      min-height: 100vh;
      color: var(--text);
      overflow-x: hidden;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    /* ===== МУЗЫКАЛЬНЫЕ ЧАСТИЦЫ (НОТЫ, СКРИПИЧНЫЙ КЛЮЧ) ===== */
    .music-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .note {
      position: absolute;
      font-size: 2rem;
      color: rgba(255,255,255,0.08);
      animation: floatNote 12s infinite ease-in-out;
      user-select: none;
    }
    .note::before { content: '♪'; }
    .note.two::before { content: '♫'; }
    .note.three::before { content: '♩'; }
    .note.four::before { content: '♪'; }
    .clef {
      position: absolute;
      font-size: 5rem;
      color: rgba(255,255,255,0.06);
      animation: pulse 6s infinite;
    }
    .clef::before { content: '𝄞'; }

    @keyframes floatNote {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
      50% { transform: translateY(-40px) rotate(10deg); opacity: 0.6; }
      100% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.1); opacity: 0.8; }
      100% { transform: scale(1); opacity: 0.4; }
    }

    /* ===== ОСНОВНОЙ КОНТЕЙНЕР ===== */
    .container {
      width: 100%;
      max-width: 900px;
      position: relative; z-index: 2;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.05);
      border-radius: 40px;
      padding: 2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .user-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
    }
    .user-bar span { color: #b8a9d4; }
    .btn-logout {
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      color: #e0d0ff;
      cursor: pointer;
      font-size: 0.8rem;
      transition: 0.3s;
    }
    .btn-logout:hover { background: rgba(255,77,109,0.3); border-color: var(--accent); }

    h1 {
      text-align: center;
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ff4d6d, #f9ca24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      letter-spacing: -1px;
    }
    .subtitle {
      text-align: center;
      color: #b8a9d4;
      margin-bottom: 2.5rem;
      font-size: 1rem;
    }

    /* ===== КАРТОЧКИ ===== */
    .cards {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .card {
      background: var(--surface);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 24px;
      padding: 1.5rem 1.8rem;
      width: 160px;
      text-align: center;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
    }
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 30px rgba(255,77,109,0.3);
      border-color: var(--accent);
    }
    .card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .card:hover::before { opacity: 1; }

    .card-icon {
      margin-bottom: 0.8rem;
      display: flex;
      justify-content: center;
    }
    .card-icon svg {
      width: 44px; height: 44px;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
      transition: transform 0.3s;
    }
    .card:hover .card-icon svg { transform: scale(1.1); }

    .card h2 {
      font-size: 1.1rem;
      margin-bottom: 0.3rem;
      font-weight: 600;
    }
    .card p {
      font-size: 0.75rem;
      color: #b8a9d4;
      line-height: 1.3;
    }

    .card.schedule .card-icon svg { stroke: #ff6b6b; }
    .card.contests .card-icon svg { stroke: #55efc4; }
    .card.nps .card-icon svg { stroke: #a29bfe; }

    .coming-soon {
      opacity: 0.6;
      pointer-events: none;
    }

    /* ===== АНИМАЦИЯ ПОЯВЛЕНИЯ ===== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card:nth-child(1) { animation: fadeInUp 0.6s ease forwards; }
    .card:nth-child(2) { animation: fadeInUp 0.6s 0.1s ease forwards; opacity: 0; }
    .card:nth-child(3) { animation: fadeInUp 0.6s 0.2s ease forwards; opacity: 0; }

    /* ===== МОБИЛЬНАЯ АДАПТАЦИЯ ===== */
    @media (max-width: 600px) {
      .cards { flex-direction: column; align-items: center; }
      .card { width: 100%; max-width: 280px; }
    }
  </style>
</head>
<body>
  <!-- Музыкальный фон -->
  <div class="music-bg">
    <div class="note" style="top:10%; left:5%; animation-delay:0s;"></div>
    <div class="note two" style="top:20%; right:10%; animation-delay:2s;"></div>
    <div class="note three" style="bottom:15%; left:15%; animation-delay:4s;"></div>
    <div class="note four" style="bottom:10%; right:5%; animation-delay:6s;"></div>
    <div class="clef" style="top:40%; left:50%; transform:translateX(-50%); animation-delay:1s;"></div>
  </div>

  <div class="container">
    <div class="user-bar" id="userBar">
      <span id="userEmail"></span>
      <button class="btn-logout" id="logoutBtn">Выйти</button>
    </div>

    <h1>Music Club Орёл</h1>
    <p class="subtitle">Управление музыкальной школой</p>

    <div class="cards">
      <!-- График работы -->
      <a href="schedule.html" class="card schedule">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </div>
        <h2>График</h2>
        <p>Расписание и зарплата</p>
      </a>

      <!-- Конкурсы -->
      <a href="contests.html" class="card contests coming-soon">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
          </svg>
        </div>
        <h2>Конкурсы</h2>
        <p>Скоро открытие</p>
      </a>

      <!-- NPS -->
      <a href="nps.html" class="card nps coming-soon">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14Z"/>
            <path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/>
          </svg>
        </div>
        <h2>NPS</h2>
        <p>Отзывы учеников</p>
      </a>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ujsakubqnirmpdwmmtju.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqc2FrdWJxbmlybXBkd21tdGp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNDUwOTEsImV4cCI6MjA5ODgyMTA5MX0.8YZCsCpjroirJvKuQie76qXtpOvpmpE7dQoz2G502p4';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        window.location.href = 'login.html';
        return;
      }
      document.getElementById('userEmail').textContent = session.user.email;
      document.getElementById('logoutBtn').addEventListener('click', async () => {
        await supabase.auth.signOut();
        window.location.href = 'login.html';
      });
    })();
  </script>
</body>
</html>
