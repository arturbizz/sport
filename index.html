<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5">
  <title>График работы — Music Club Орёл</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg-light: #f0f4f8;
      --primary: #2b6cb0;
      --accent: #f6ad55;
      --text: #2d3748;
      --glass: rgba(255,255,255,0.7);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #e0f2fe 0%, #fef9c3 50%, #fde68a 100%);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: var(--text);
      min-height: 100vh;
      padding: 1.5rem;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Легкие облака */
    .cloud {
      position: fixed; top: 10%; left: -150px;
      width: 200px; height: 60px;
      background: white; border-radius: 100px;
      opacity: 0.5; filter: blur(8px);
      animation: floatCloud 30s linear infinite;
    }
    .cloud:nth-child(2) { top: 30%; left: 60%; width: 250px; height: 70px; animation-duration: 25s; opacity: 0.4; }
    .cloud:nth-child(3) { top: 70%; left: 20%; width: 180px; height: 50px; animation-duration: 35s; opacity: 0.3; }
    @keyframes floatCloud {
      from { transform: translateX(0); }
      to { transform: translateX(calc(100vw + 300px)); }
    }

    /* Солнце без лица */
    .sun {
      position: fixed; top: 30px; right: 80px;
      width: 80px; height: 80px;
      background: #FFD700; border-radius: 50%;
      box-shadow: 0 0 50px 15px #FFA500, 0 0 100px 30px #FF8C00;
      animation: sunGlow 3s ease-in-out infinite alternate;
    }
    @keyframes sunGlow {
      from { box-shadow: 0 0 50px 15px #FFA500, 0 0 100px 30px #FF8C00; }
      to { box-shadow: 0 0 60px 20px #FFB347, 0 0 120px 40px #FFA500; }
    }

    .container { position: relative; z-index: 10; width: 100%; max-width: 1400px; }

    .header {
      display: flex; align-items: center; gap: 1rem;
      flex-wrap: wrap; background: var(--glass);
      backdrop-filter: blur(12px); padding: 0.8rem 1.5rem;
      border-radius: 2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      margin-bottom: 1.5rem;
    }
    .logo {
      font-size: 1.8rem; font-weight: 800;
      background: linear-gradient(135deg, #1e3a8a, #3b82f6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-right: auto;
    }
    .nav-arrows { display: flex; gap: 0.5rem; }
    .nav-arrows button, .period-btn, .export-btn, .emp-btn {
      background: rgba(255,255,255,0.8); border: none;
      padding: 0.5rem 1.2rem; border-radius: 2rem;
      font-weight: 600; font-size: 0.9rem; cursor: pointer;
      transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.03);
      display: flex; align-items: center; gap: 0.4rem;
    }
    .nav-arrows button:hover, .period-btn:hover, .export-btn:hover, .emp-btn:hover {
      background: white; transform: translateY(-1px); box-shadow: 0 6px 15px rgba(0,0,0,0.08);
    }
    .period-btn.active { background: #fbbf24; color: #1e293b; }
    .month-title {
      min-width: 140px; text-align: center; font-weight: 700; font-size: 1.2rem;
      background: rgba(255,255,255,0.9); padding: 0.4rem 1.2rem; border-radius: 2rem;
    }

    .schedule-container {
      background: var(--glass); backdrop-filter: blur(15px);
      border-radius: 2rem; padding: 1.2rem; overflow-x: auto;
      max-height: 75vh; box-shadow: 0 15px 35px rgba(0,0,0,0.08);
      scrollbar-width: thin; scrollbar-color: #a0c4ff rgba(255,255,255,0.2);
    }
    table { width: 100%; border-collapse: separate; border-spacing: 0 4px; min-width: 1200px; }
    th { background: rgba(255,255,255,0.85); padding: 0.6rem 0.3rem; font-size: 0.85rem; position: sticky; top: 0; z-index: 5; border-radius: 12px 12px 0 0; }
    td { padding: 0.4rem 0.2rem; text-align: center; font-size: 0.9rem; }

    .employee-name {
      text-align: left; font-weight: 700; padding-left: 1rem;
      background: rgba(255,255,255,0.5); border-radius: 12px; cursor: pointer;
      transition: 0.2s;
    }
    .employee-name:hover { background: rgba(255,255,255,0.9); color: #2563eb; }
    .group-header {
      background: rgba(251,191,36,0.25); font-weight: 700; padding: 0.7rem 1.2rem;
      border-radius: 16px; margin-top: 0.8rem; font-size: 1rem;
    }

    .day-cell {
      cursor: pointer; background: rgba(255,255,255,0.6); border-radius: 12px;
      height: 42px; display: flex; flex-direction: column; align-items: center; justify-content: center;
      margin: 1px; font-weight: 600; transition: 0.15s;
    }
    .day-cell:hover { background: white; transform: scale(1.02); box-shadow: 0 4px 8px rgba(0,0,0,0.08); }
    .day-cell.working { background: #86efac; color: #14532d; }
    .day-cell.dayoff { background: #fecaca; color: #991b1b; }
    .day-cell.sick { background: #c4b5fd; color: #4c1d95; }
    .day-cell.vacation { background: #7dd3fc; color: #0c4a6e; }
    .day-cell.leave { background: #fde68a; color: #78350f; }
    .day-cell.has-comment { border: 2px solid #fbbf24; }

    .big-ruble { font-size: 1.3rem; font-weight: bold; }
    .summary-cell { font-weight: 700; background: rgba(255,255,255,0.7); border-radius: 10px; }

    .salary-summary {
      margin-top: 1rem; background: rgba(255,255,255,0.6); backdrop-filter: blur(12px);
      border-radius: 1.5rem; padding: 0.8rem 1.5rem;
      display: flex; flex-wrap: wrap; gap: 1.5rem; font-weight: 600;
    }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal {
      background: white; border-radius: 2rem; padding: 2rem;
      max-width: 500px; width: 90%; box-shadow: 0 30px 50px rgba(0,0,0,0.3);
      animation: modalPop 0.25s ease-out;
    }
    @keyframes modalPop { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    .btn-save {
      background: #2563eb; color: white; padding: 0.8rem 2rem; border-radius: 2rem;
      border: none; font-weight: 700; cursor: pointer; width: 100%; margin-top: 1rem;
      transition: 0.2s;
    }
    .btn-save:hover { background: #1d4ed8; }

    .toast-center { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 3000; pointer-events: none; }
    .toast-content {
      display: flex; align-items: center; gap: 1rem;
      background: #059669; color: white; padding: 1rem 2rem; border-radius: 3rem;
      box-shadow: 0 20px 35px rgba(0,0,0,0.3);
      animation: toastIn 0.3s forwards, toastOut 0.3s 1.5s forwards;
    }
    @keyframes toastIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: scale(0.9); } }

    .error-banner { background: #fee2e2; color: #991b1b; padding: 0.8rem 1.5rem; border-radius: 1.5rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <!-- Легкие облака -->
  <div class="cloud"></div>
  <div class="cloud"></div>
  <div class="cloud"></div>
  <div class="sun"></div>

  <div class="container">
    <div class="header">
      <div class="logo">Music Club Орёл</div>
      <div class="nav-arrows">
        <button onclick="changeMonth(-1)">◀</button>
        <span class="month-title" id="monthTitle"></span>
        <button onclick="changeMonth(1)">▶</button>
      </div>
      <div id="periodBtns" style="display:flex; gap:0.5rem;">
        <button class="period-btn active" data-period="full">Весь месяц</button>
        <button class="period-btn" data-period="first">1–15</button>
        <button class="period-btn" data-period="second">16–31</button>
      </div>
      <button class="export-btn" onclick="exportToExcel()">📥 Excel</button>
      <button class="export-btn" onclick="location.reload()">🔄 Обновить</button>
      <div style="position:relative;">
        <button class="emp-btn" id="empToggle">👥 Сотрудники</button>
        <div id="empList" style="display:none; position:absolute; right:0; top:2.5rem; background:white; border-radius:1.5rem; padding:1rem; box-shadow:0 20px 35px rgba(0,0,0,0.2); z-index:200; min-width:240px;">
          <div id="empCheckboxes"></div>
        </div>
      </div>
    </div>

    <div id="errorContainer"></div>

    <div class="schedule-container" id="scheduleTableContainer">
      <div style="padding:3rem; text-align:center; font-size:1.2rem;">Загрузка...</div>
    </div>
  </div>

  <!-- Модалка дня -->
  <div class="modal-overlay" id="dayModal" style="display:none;">
    <div class="modal">
      <button style="float:right; background:none; border:none; font-size:1.5rem; cursor:pointer;" onclick="closeModal('dayModal')">✕</button>
      <h3 id="modalTitle"></h3>
      <div id="statusOptions" style="margin:1.5rem 0;"></div>
      <div id="dynamicFields"></div>
      <textarea id="comment" rows="2" style="width:100%; margin:1rem 0; padding:0.8rem; border-radius:1rem; border:1px solid #ddd;" placeholder="Примечание"></textarea>
      <button class="btn-save" onclick="saveDay()">Сохранить</button>
    </div>
  </div>

  <!-- Модалка зарплаты -->
  <div class="modal-overlay" id="salaryModal" style="display:none;">
    <div class="modal" style="max-width:600px;">
      <button style="float:right; background:none; border:none; font-size:1.5rem; cursor:pointer;" onclick="closeModal('salaryModal')">✕</button>
      <h3 id="salaryModalTitle"></h3>
      <div id="salaryContent"></div>
      <button class="btn-save" onclick="saveSalary()">Сохранить параметры</button>
    </div>
  </div>

  <script>
    // Конфигурация Supabase (уже твоя)
    const SUPABASE_URL = 'https://ujsakubqnirmpdwmmtju.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqc2FrdWJxbmlybXBkd21tdGp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNDUwOTEsImV4cCI6MjA5ODgyMTA5MX0.8YZCsCpjroirJvKuQie76qXtpOvpmpE7dQoz2G502p4';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let employees = [], worklog = {}, salaryParams = {};
    let currentYear, currentMonth, currentPeriod = 'full', selectedIds = new Set();

    const STATUSES = ['working', 'dayoff', 'sick', 'vacation', 'leave'];
    const STATUS_LABELS = { working: 'Д', dayoff: 'В', sick: 'Б', vacation: 'О', leave: 'От' };
    const STATUS_CLASSES = { working: 'working', dayoff: 'dayoff', sick: 'sick', vacation: 'vacation', leave: 'leave' };

    // Вспомогательные
    function showToast(msg, err=false) {
      const t = document.createElement('div'); t.className = 'toast-center';
      t.innerHTML = `<div class="toast-content" style="background:${err?'#dc2626':'#059669'}">${msg}</div>`;
      document.body.appendChild(t); setTimeout(() => t.remove(), 1800);
    }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // Загрузка данных
    async function loadData() {
      document.getElementById('errorContainer').innerHTML = '';
      try {
        const monthStr = `${currentYear}-${String(currentMonth).padStart(2,'0')}`;
        const [empRes, logRes, salRes] = await Promise.all([
          supabase.from('employees').select('*'),
          supabase.from('worklog').select('*').like('date', `${monthStr}%`),
          supabase.from('salary_params').select('*').eq('month', monthStr)
        ]);
        if (empRes.error) throw new Error('Ошибка загрузки сотрудников: ' + empRes.error.message);
        if (logRes.error) throw new Error('Ошибка загрузки журнала: ' + logRes.error.message);
        employees = empRes.data;
        if (selectedIds.size === 0) employees.forEach(e => selectedIds.add(e.id));
        worklog = {};
        (logRes.data || []).forEach(r => { worklog[`${r.emp_id}_${r.date}`] = r; });
        salaryParams = {};
        (salRes.data || []).forEach(r => { salaryParams[r.emp_id] = r; });
        renderCheckboxes();
        renderTable();
      } catch (e) {
        document.getElementById('errorContainer').innerHTML = `<div class="error-banner">❌ ${e.message}</div>`;
      }
    }

    function renderCheckboxes() {
      document.getElementById('empCheckboxes').innerHTML = employees.map(e => `
        <label style="display:block; margin:0.3rem 0; cursor:pointer;">
          <input type="checkbox" ${selectedIds.has(e.id)?'checked':''} onchange="toggleEmployee('${e.id}', this.checked)"> ${e.name} <small style="color:#666;">${e.role}</small>
        </label>`).join('');
    }
    window.toggleEmployee = (id, checked) => {
      checked ? selectedIds.add(id) : selectedIds.delete(id);
      renderTable();
    };

    // Расчет зарплаты (как раньше, без изменений)
    function getManagerNormDays(y, m) {
      const days = new Date(y, m, 0).getDate();
      let cnt = 0;
      for (let d=1; d<=days; d++) if ((d-1)%6 < 3) cnt++;
      return cnt;
    }
    function getFullMonthSales(emp) {
      let total = 0;
      const days = new Date(currentYear, currentMonth, 0).getDate();
      for (let d=1; d<=days; d++) {
        const key = `${emp.id}_${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const dta = worklog[key];
        if (dta && dta.status === 'working') total += dta.daily_sales || 0;
      }
      return total;
    }
    function getSalary(emp) {
      const days = new Date(currentYear, currentMonth, 0).getDate();
      let worked = 0, indiv = 0, group = 0;
      let fullSales = 0;
      for (let d=1; d<=days; d++) {
        const key = `${emp.id}_${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const rec = worklog[key];
        if (!rec || rec.status !== 'working') continue;
        if (emp.role === 'Менеджер') fullSales += rec.daily_sales || 0;
        if ((currentPeriod === 'full') || (currentPeriod === 'first' && d<=15) || (currentPeriod === 'second' && d>=16)) {
          worked++;
          if (emp.role === 'Преподаватель') { indiv += rec.indiv||0; group += rec.group_total||0; }
        }
      }
      const params = salaryParams[emp.id] || {};
      const norm = emp.role === 'Менеджер' ? getManagerNormDays(currentYear, currentMonth) : (params.norm_days || 22);
      const rates = { 'Менеджер':20000, 'Администратор':35000, 'Управляющий':50000 };
      const base = (rates[emp.role] || 0) / norm * worked;
      if (emp.role === 'Преподаватель') return indiv*400 + group*500;
      if (emp.role === 'Менеджер') {
        const plan = params.plan_amount || 0;
        const bonusPct = (plan>0 && fullSales>=plan) ? 7 : 5;
        const bonus = currentPeriod==='first' ? 0 : fullSales * bonusPct/100;
        return base + bonus;
      }
      if (emp.role === 'Администратор') {
        const mgrs = employees.filter(e=>e.role==='Менеджер');
        let totalMgrs = 0; mgrs.forEach(m=> totalMgrs += getFullMonthSales(m));
        return base + (currentPeriod!=='first' ? totalMgrs*0.01 : 0);
      }
      if (emp.role === 'Управляющий') {
        const mgrs = employees.filter(e=>e.role==='Менеджер');
        let totalMgrs = 0; mgrs.forEach(m=> totalMgrs += getFullMonthSales(m));
        const plan = params.plan_amount || 0;
        const fulfilled = plan>0 && totalMgrs>=plan;
        return base + (fulfilled && currentPeriod!=='first' ? totalMgrs*0.01 : 0);
      }
      return 0;
    }

    function renderTable() {
      const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
      document.getElementById('monthTitle').textContent = new Date(currentYear, currentMonth-1).toLocaleDateString('ru',{month:'long',year:'numeric'});
      const filtered = employees.filter(e => selectedIds.has(e.id));
      let html = '<table><thead><tr><th>Сотрудник</th><th>Смен</th><th>ЗП</th>';
      for (let d=1; d<=daysInMonth; d++) html += `<th>${d}<br><small>${new Date(currentYear,currentMonth-1,d).toLocaleDateString('ru',{weekday:'short'})}</small></th>`;
      html += '</tr></thead><tbody>';
      ['Управляющий','Менеджер','Администратор','Преподаватель'].forEach(role => {
        const group = filtered.filter(e => e.role === role);
        if (!group.length) return;
        html += `<tr><td colspan="${daysInMonth+3}" class="group-header">${role}ы</td></tr>`;
        group.forEach(emp => {
          let worked = 0, indiv = 0, group = 0;
          let cells = '';
          for (let d=1; d<=daysInMonth; d++) {
            const dateStr = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const rec = worklog[`${emp.id}_${dateStr}`] || {};
            const status = rec.status;
            if (status === 'working' && (currentPeriod==='full' || (currentPeriod==='first' && d<=15) || (currentPeriod==='second' && d>=16))) {
              worked++;
              if (emp.role === 'Преподаватель') { indiv += rec.indiv||0; group += rec.group_total||0; }
            }
            let cls = 'day-cell';
            if (status) cls += ' ' + (STATUS_CLASSES[status]||'');
            if (rec.comment) cls += ' has-comment';
            let content = status ? (STATUS_LABELS[status]||status) : '';
            let tooltip = '';
            if (emp.role === 'Менеджер' && status === 'working') {
              content = rec.daily_sales > 0 ? '<span class="big-ruble">₽</span>' : 'Д';
              if (rec.daily_sales) tooltip = `Выручка: ${rec.daily_sales} ₽`;
            } else if (emp.role === 'Преподаватель' && status === 'working') {
              content = `Д<br><small>${rec.indiv||0}/${rec.group_total||0}</small>`;
            }
            if (rec.comment) tooltip += (tooltip?' ':'') + rec.comment;
            cells += `<td onclick="openDayModal('${emp.id}','${dateStr}')" ${tooltip?`title="${tooltip}"`:''}><div class="${cls}">${content}</div></td>`;
          }
          const salary = getSalary(emp);
          html += `<tr><td class="employee-name" onclick="openSalaryModal('${emp.id}')">${emp.name}</td>`;
          html += `<td class="summary-cell">${worked}</td><td class="summary-cell">${salary.toFixed(0)} ₽</td>${cells}</tr>`;
        });
      });
      html += '</tbody></table>';
      document.getElementById('scheduleTableContainer').innerHTML = html;
    }

    window.changeMonth = (delta) => {
      currentMonth += delta;
      if (currentMonth < 1) { currentMonth=12; currentYear--; }
      else if (currentMonth > 12) { currentMonth=1; currentYear++; }
      loadData();
    };

    window.openDayModal = (empId, dateStr) => {
      const emp = employees.find(e=>e.id===empId);
      const rec = worklog[`${empId}_${dateStr}`] || {};
      document.getElementById('modalTitle').textContent = `${emp.name} — ${dateStr}`;
      document.getElementById('comment').value = rec.comment || '';
      document.getElementById('statusOptions').innerHTML = STATUSES.map(s =>
        `<label style="margin-right:1rem;"><input type="radio" name="dayStatus" value="${s}" ${rec.status===s?'checked':''}> ${STATUS_LABELS[s]}</label>`
      ).join('');
      let dyn = '';
      if (emp.role === 'Менеджер') dyn = `<label>Выручка: <input type="number" id="dailySales" value="${rec.daily_sales||''}" style="width:120px; margin-left:0.5rem;"></label>`;
      else if (emp.role === 'Преподаватель') dyn = `<label>Инд.: <input type="number" id="indiv" value="${rec.indiv||''}" style="width:70px; margin:0 0.5rem;"></label><label>Групп.: <input type="number" id="groupTotal" value="${rec.group_total||''}" style="width:70px;"></label>`;
      document.getElementById('dynamicFields').innerHTML = dyn;
      document.getElementById('dayModal').style.display = 'flex';
      window._editEmpId = empId;
      window._editDate = dateStr;
    };

    window.saveDay = async () => {
      const status = document.querySelector('input[name="dayStatus"]:checked')?.value;
      if (!status) return showToast('Выберите статус', true);
      const comment = document.getElementById('comment').value.trim();
      const emp = employees.find(e=>e.id===window._editEmpId);
      let dailySales=0, indiv=0, groupTotal=0;
      if (emp.role==='Менеджер') dailySales = parseFloat(document.getElementById('dailySales')?.value)||0;
      if (emp.role==='Преподаватель') {
        indiv = parseInt(document.getElementById('indiv')?.value)||0;
        groupTotal = parseInt(document.getElementById('groupTotal')?.value)||0;
      }
      const {error} = await supabase.from('worklog').upsert({
        emp_id: window._editEmpId,
        date: window._editDate,
        status, comment, daily_sales: dailySales, indiv, group_total: groupTotal
      }, {onConflict: 'emp_id, date'});
      if (error) return showToast('Ошибка: '+error.message, true);
      showToast('Сохранено');
      closeModal('dayModal');
      loadData();
    };

    window.openSalaryModal = (empId) => {
      const emp = employees.find(e=>e.id===empId);
      const params = salaryParams[empId] || {};
      let html = `<p><b>${emp.name}</b></p>`;
      if (emp.role==='Менеджер') html += `<label>План продаж: <input type="number" id="planAmount" value="${params.plan_amount||''}" style="width:120px;"></label>`;
      else if (emp.role==='Управляющий') html += `<label>Норма дней: <input type="number" id="normDays" value="${params.norm_days||''}" style="width:80px;"></label><br><label>План продаж: <input type="number" id="planAmount" value="${params.plan_amount||''}" style="width:120px;"></label>`;
      else if (emp.role==='Администратор') html += `<label>Норма дней: <input type="number" id="normDays" value="${params.norm_days||''}" style="width:80px;"></label>`;
      document.getElementById('salaryModalTitle').textContent = 'Параметры зарплаты';
      document.getElementById('salaryContent').innerHTML = html;
      document.getElementById('salaryModal').style.display = 'flex';
      window._salaryEmpId = empId;
    };

    window.saveSalary = async () => {
      const emp = employees.find(e=>e.id===window._salaryEmpId);
      const monthStr = `${currentYear}-${String(currentMonth).padStart(2,'0')}`;
      let normDays=null, planAmount=null;
      if (emp.role==='Менеджер') planAmount = parseFloat(document.getElementById('planAmount')?.value)||0;
      else if (emp.role==='Управляющий') {
        normDays = parseInt(document.getElementById('normDays')?.value)||22;
        planAmount = parseFloat(document.getElementById('planAmount')?.value)||0;
      } else if (emp.role==='Администратор') normDays = parseInt(document.getElementById('normDays')?.value)||22;
      const {error} = await supabase.from('salary_params').upsert({
        emp_id: window._salaryEmpId, month: monthStr, norm_days: normDays, plan_amount: planAmount
      }, {onConflict: 'emp_id, month'});
      if (error) return showToast('Ошибка: '+error.message, true);
      showToast('Параметры сохранены');
      closeModal('salaryModal');
      loadData();
    };

    window.exportToExcel = () => {
      const table = document.querySelector('.schedule-container table');
      if (!table) return showToast('Нет данных', true);
      const wb = XLSX.utils.table_to_book(table, {sheet:'График'});
      XLSX.writeFile(wb, `График_${currentYear}-${String(currentMonth).padStart(2,'0')}.xlsx`);
      showToast('Excel скачан');
    };

    // Переключение периода
    document.getElementById('periodBtns').addEventListener('click', (e) => {
      if (e.target.classList.contains('period-btn')) {
        document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
        e.target.classList.add('active');
        currentPeriod = e.target.dataset.period;
        renderTable();
      }
    });
    // Выпадающий список сотрудников
    document.getElementById('empToggle').addEventListener('click', (e) => {
      e.stopPropagation();
      const list = document.getElementById('empList');
      list.style.display = list.style.display === 'none' ? 'block' : 'none';
    });
    document.addEventListener('click', (e) => {
      if (!e.target.closest('#empToggle') && !e.target.closest('#empList')) {
        document.getElementById('empList').style.display = 'none';
      }
    });

    // Старт
    const now = new Date();
    currentYear = now.getFullYear();
    currentMonth = now.getMonth() + 1;
    loadData();
  </script>
</body>
</html>
