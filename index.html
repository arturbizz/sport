<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Club Орёл — Платформа управления</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: rgba(255,255,255,0.7);
      --text: #2d3436;
      --text-light: #636e72;
      --accent: #ff6b6b;
      --gold: #f9ca24;
      --mint: #55efc4;
      --card-shadow: 0 15px 35px rgba(0,0,0,0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #fef9f0 0%, #fff5f5 30%, #f0f4ff 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Музыкальный фон (ноты и скрипичный ключ) */
    .music-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .note {
      position: absolute;
      font-size: 2.5rem;
      color: rgba(255,107,107,0.12);
      animation: floatNote 10s infinite ease-in-out;
    }
    .note::before { content: '♪'; }
    .note.two::before { content: '♫'; }
    .note.three::before { content: '♩'; }
    .clef {
      position: absolute;
      font-size: 6rem;
      color: rgba(249,202,36,0.1);
      animation: pulse 8s infinite;
    }
    .clef::before { content: '𝄞'; }

    @keyframes floatNote {
      0% { transform: translateY(0px) rotate(0deg); opacity: 0.4; }
      50% { transform: translateY(-30px) rotate(5deg); opacity: 0.8; }
      100% { transform: translateY(0px) rotate(0deg); opacity: 0.4; }
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.1); opacity: 0.6; }
      100% { transform: scale(1); opacity: 0.3; }
    }

    .container {
      position: relative; z-index: 2;
      width: 100%; max-width: 850px;
      background: var(--surface);
      backdrop-filter: blur(10px);
      border-radius: 40px;
      padding: 2rem;
      box-shadow: var(--card-shadow);
      border: 1px solid rgba(255,255,255,0.8);
    }

    .user-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
    }
    .user-bar span { color: #636e72; }
    .btn-logout {
      background: none;
      border: 1px solid #e0e0e0;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      color: #636e72;
      cursor: pointer;
      font-size: 0.8rem;
      transition: 0.3s;
    }
    .btn-logout:hover { background: #ffe0e0; border-color: var(--accent); }

    h1 {
      text-align: center;
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.3rem;
      letter-spacing: -1px;
    }
    .subtitle {
      text-align: center;
      color: #636e72;
      margin-bottom: 2.5rem;
      font-size: 1rem;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      flex-wrap: wrap;
    }
    .card {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: 20px;
      padding: 1.3rem 1.5rem;
      width: 150px;
      text-align: center;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.03);
      position: relative;
      overflow: hidden;
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 15px 25px rgba(255,107,107,0.15);
      border-color: var(--accent);
    }
    .card-icon {
      margin-bottom: 0.7rem;
      display: flex;
      justify-content: center;
    }
    .card-icon svg {
      width: 40px; height: 40px;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
      transition: transform 0.3s;
    }
    .card:hover .card-icon svg { transform: scale(1.1); }
    .card h2 {
      font-size: 1rem;
      margin-bottom: 0.2rem;
      font-weight: 600;
    }
    .card p {
      font-size: 0.7rem;
      color: #636e72;
      line-height: 1.3;
    }

    .card.schedule .card-icon svg { stroke: #ff6b6b; }
    .card.contests .card-icon svg { stroke: #55efc4; }
    .card.nps .card-icon svg { stroke: #a29bfe; }

    .coming-soon { opacity: 0.5; pointer-events: none; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card:nth-child(1) { animation: fadeInUp 0.5s ease forwards; }
    .card:nth-child(2) { animation: fadeInUp 0.5s 0.1s ease forwards; opacity: 0; }
    .card:nth-child(3) { animation: fadeInUp 0.5s 0.2s ease forwards; opacity: 0; }

    @media (max-width: 600px) {
      .cards { flex-direction: column; align-items: center; }
      .card { width: 100%; max-width: 250px; }
    }
  </style>
</head>
<body>
  <!-- Музыкальные элементы -->
  <div class="music-bg">
    <div class="note" style="top:10%; left:5%; animation-delay:0s;"></div>
    <div class="note two" style="top:25%; right:8%; animation-delay:2.5s;"></div>
    <div class="note three" style="bottom:20%; left:12%; animation-delay:5s;"></div>
    <div class="note" style="bottom:10%; right:15%; animation-delay:7s;"></div>
    <div class="clef" style="top:50%; left:50%; transform:translate(-50%,-50%);"></div>
  </div>

  <div class="container">
    <div class="user-bar" id="userBar">
      <span id="userEmail"></span>
      <button class="btn-logout" id="logoutBtn">Выйти</button>
    </div>

    <h1>Music Club Орёл</h1>
    <p class="subtitle">Управление музыкальной школой</p>

    <div class="cards">
      <a href="schedule.html" class="card schedule">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </div>
        <h2>График</h2>
        <p>Расписание и зарплата</p>
      </a>

      <a href="contests.html" class="card contests coming-soon">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
          </svg>
        </div>
        <h2>Конкурсы</h2>
        <p>Скоро открытие</p>
      </a>

      <a href="nps.html" class="card nps coming-soon">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14Z"/>
            <path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/>
          </svg>
        </div>
        <h2>NPS</h2>
        <p>Отзывы учеников</p>
      </a>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ujsakubqnirmpdwmmtju.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqc2FrdWJxbmlybXBkd21tdGp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNDUwOTEsImV4cCI6MjA5ODgyMTA5MX0.8YZCsCpjroirJvKuQie76qXtpOvpmpE7dQoz2G502p4';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        window.location.href = 'login.html';
        return;
      }
      document.getElementById('userEmail').textContent = session.user.email;
      document.getElementById('logoutBtn').addEventListener('click', async () => {
        await supabase.auth.signOut();
        window.location.href = 'login.html';
      });
    })();
  </script>
</body>
</html>
