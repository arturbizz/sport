<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>График работы — Music Club Орёл</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --violet: #7c5ce7;
      --teal: #0fb9b1;
      --gold: #f9ca24;
      --rose: #ff8c94;
      --bg: #fef9f0;
      --surface: rgba(255,255,255,0.85);
      --text: #2d3436;
      --text-light: #636e72;
      --border: #e0e0e0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, .container, .header, .modal {
      -webkit-user-select: none; user-select: none; cursor: default;
    }
    input, textarea, select {
      -webkit-user-select: text; user-select: text; cursor: text;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #fef9f0 0%, #f0f7f5 100%);
      color: var(--text);
      padding: 1.5rem;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      position: relative;
      overflow-x: hidden;
    }
    .music-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .note {
      position: absolute;
      font-size: 2rem;
      color: rgba(124,92,231,0.08);
      animation: floatNote 12s infinite ease-in-out;
    }
    .note::before { content: '♪'; }
    .note.two::before { content: '♫'; }
    .note.three::before { content: '♩'; }
    @keyframes floatNote {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
      50% { transform: translateY(-30px) rotate(8deg); opacity: 0.7; }
      100% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
    }

    .container {
      position: relative; z-index: 2;
      width: 100%; max-width: 1400px;
      background: var(--surface);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 8px 30px rgba(0,0,0,0.04);
      border: 1px solid rgba(255,255,255,0.6);
    }
    .header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;
    }
    .back-link { color: var(--violet); text-decoration: none; font-weight: 600; font-size: 0.9rem; }
    h1 {
      font-size: 2rem; font-weight: 700;
      background: linear-gradient(135deg, var(--violet), var(--gold), var(--teal));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .btn {
      border: none; padding: 0.5rem 1.2rem; border-radius: 14px;
      font-weight: 600; cursor: pointer; font-size: 0.85rem;
      transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 0.3rem;
      background: linear-gradient(135deg, rgba(124,92,231,0.12), rgba(15,185,177,0.12));
      color: var(--violet);
      box-shadow: 0 4px 12px rgba(124,92,231,0.15), 0 0 0 1px rgba(124,92,231,0.1) inset;
      backdrop-filter: blur(4px);
    }
    .btn:hover {
      background: linear-gradient(135deg, var(--violet), var(--teal));
      color: white;
      box-shadow: 0 8px 24px rgba(124,92,231,0.3), 0 0 0 1px rgba(255,255,255,0.2) inset;
      transform: translateY(-2px);
    }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--violet);
      color: var(--violet);
      box-shadow: none;
    }
    .btn-outline:hover { background: var(--violet); color: white; }

    .filters {
      display: flex; gap: 0.8rem; flex-wrap: wrap;
      margin-bottom: 2rem; align-items: center;
    }
    .filter-btn {
      padding: 0.4rem 1.2rem; border-radius: 20px;
      border: 1px solid var(--border); background: white;
      cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: 0.2s;
    }
    .filter-btn.active { background: var(--violet); color: white; border-color: var(--violet); }
    .emp-filter-wrap { position: relative; }
    .emp-filter-btn {
      padding: 0.4rem 1.5rem 0.4rem 1rem; border-radius: 20px;
      border: 1px solid var(--border); background: white;
      cursor: pointer; font-size: 0.85rem; font-weight: 500;
      display: flex; align-items: center; gap: 0.5rem;
      transition: 0.2s; white-space: nowrap;
    }
    .emp-filter-btn::after { content: '▼'; font-size: 0.6rem; color: var(--text-light); }
    .emp-filter-btn:hover { border-color: var(--violet); }
    .emp-dropdown {
      position: absolute; top: 100%; left: 0; margin-top: 4px;
      background: white; border: 1px solid var(--border);
      border-radius: 14px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      z-index: 20; min-width: 220px; display: none;
      padding: 0.5rem; animation: fadeIn 0.2s ease;
    }
    .emp-dropdown.open { display: block; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .emp-dropdown-item {
      padding: 0.4rem 0.8rem; cursor: pointer;
      border-radius: 8px; font-size: 0.85rem; transition: 0.1s;
    }
    .emp-dropdown-item:hover { background: #f4f0ff; }
    .emp-dropdown-item.active { background: var(--violet); color: white; }

    .schedule-container {
      overflow-x: auto;
      background: white;
      border-radius: 16px;
      border: 1px solid var(--border);
      margin-top: 1rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 750px;
    }
    th, td {
      text-align: center;
      padding: 0.5rem 0.3rem;
      font-size: 0.8rem;
      border: 1px solid #f0f0f0;
      height: 42px;
    }
    th {
      background: #fafafa;
      color: var(--text-light);
      font-weight: 600;
      position: sticky; top: 0; z-index: 3;
    }
    .employee-name {
      text-align: left;
      padding-left: 1rem;
      font-weight: 600;
      background: white;
      position: sticky; left: 0; z-index: 2;
      min-width: 180px; cursor: pointer;
    }
    .employee-name:hover { color: var(--violet); }
    .day-cell {
      cursor: pointer;
      transition: 0.2s;
    }
    .day-cell:hover { background: #f4f0ff; }
    .day-cell.working { background: #d1fae5; color: #065f46; font-weight: 600; }
    .day-cell.dayoff { background: #ffe0e0; color: #991b1b; }
    .day-cell.sick { background: #fef3c7; color: #92400e; }
    .day-cell.vacation { background: #e0e7ff; color: #3730a3; }
    .day-cell.leave { background: #ffedd5; color: #9a3412; }
    .summary-cell { font-weight: 600; background: #fafafa; }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.35);
      backdrop-filter: blur(4px); display: flex;
      align-items: center; justify-content: center; z-index: 1000;
    }
    .modal {
      background: white; border-radius: 24px; padding: 2rem;
      max-width: 450px; width: 90%;
      box-shadow: 0 20px 50px rgba(0,0,0,0.12);
      animation: slideUp 0.25s ease-out;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); }
    }
    input, textarea, select {
      width: 100%; padding: 0.6rem; margin: 0.5rem 0;
      border: 1px solid var(--border); border-radius: 10px;
      font-size: 0.9rem; font-family: inherit;
    }
    .label-row {
      display: flex; justify-content: space-between; align-items: center;
      margin: 0.5rem 0;
    }
  </style>
</head>
<body>
  <div class="music-bg">
    <div class="note" style="top:10%; left:5%;"></div>
    <div class="note two" style="top:25%; right:10%;"></div>
    <div class="note three" style="bottom:20%; left:15%;"></div>
  </div>

  <div class="container">
    <div class="header">
      <a href="index.html" class="back-link">← На главную</a>
      <h1>График работы</h1>
      <div class="nav-arrows">
        <button id="prevMonthBtn">◀</button>
        <span class="month-title" id="monthTitle"></span>
        <button id="nextMonthBtn">▶</button>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-period="full">Весь месяц</button>
      <button class="filter-btn" data-period="first">1–15</button>
      <button class="filter-btn" data-period="second">16–31</button>
      <div class="emp-filter-wrap" id="empFilterWrap">
        <div class="emp-filter-btn" id="empFilterBtn">Сотрудники</div>
        <div class="emp-dropdown" id="empDropdown"></div>
      </div>
      <button class="btn" id="exportBtn">Excel</button>
    </div>

    <div id="scheduleContainer" class="schedule-container"></div>
  </div>

  <!-- Модалка дня -->
  <div class="modal-overlay" id="dayModal" style="display:none;">
    <div class="modal">
      <h2 id="dayModalTitle">Статус дня</h2>
      <select id="dayStatus">
        <option value="working">Рабочий</option>
        <option value="dayoff">Выходной</option>
        <option value="sick">Больничный</option>
        <option value="vacation">Отпуск</option>
        <option value="leave">Отпросился</option>
      </select>
      <div id="dayDynamicFields"></div>
      <textarea id="dayComment" rows="2" placeholder="Примечание"></textarea>
      <div style="display:flex; gap:0.5rem; margin-top:1rem;">
        <button class="btn" id="saveDayBtn">Сохранить</button>
        <button class="btn btn-outline" id="cancelDayBtn">Отмена</button>
      </div>
    </div>
  </div>

  <!-- Модалка зарплаты -->
  <div class="modal-overlay" id="salaryModal" style="display:none;">
    <div class="modal">
      <h2 id="salaryModalTitle" style="background:linear-gradient(135deg,var(--violet),var(--teal)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">Параметры зарплаты</h2>
      <div id="salaryContent"></div>
      <div style="display:flex; gap:0.5rem; margin-top:1rem;">
        <button class="btn" id="saveSalaryBtn">Сохранить</button>
        <button class="btn btn-outline" id="cancelSalaryBtn">Отмена</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const SUPABASE_URL = 'https://ujsakubqnirmpdwmmtju.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqc2FrdWJxbmlybXBkd21tdGp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNDUwOTEsImV4cCI6MjA5ODgyMTA5MX0.8YZCsCpjroirJvKuQie76qXtpOvpmpE7dQoz2G502p4';
      const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      const OWNER_EMAIL = 'arturgalkin.ru@mail.ru';
      let currentUserEmail = null, currentEmployee = null;
      let employees = [], worklog = {}, salaryParams = {};
      let currentYear, currentMonth, currentPeriod = 'full';
      let selectedEmployeeId = null;

      // Инициализация
      async function init() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (!session) { window.location.href = 'login.html'; return; }
        currentUserEmail = session.user.email;
        const now = new Date();
        currentYear = now.getFullYear();
        currentMonth = now.getMonth() + 1;
        await loadEmployees();
        await loadWorklog();
        await loadSalaryParams();
        renderFilterDropdown();
        renderSchedule();
      }

      async function loadEmployees() {
        const { data } = await _supabase.from('employees').select('*');
        employees = data || [];
        const emp = employees.find(e => e.email === currentUserEmail);
        currentEmployee = emp || null;
      }

      async function loadWorklog() {
        const startDate = `${currentYear}-${String(currentMonth).padStart(2,'0')}-01`;
        const nextMonth = currentMonth === 12 ? 1 : currentMonth + 1;
        const nextYear = currentMonth === 12 ? currentYear + 1 : currentYear;
        const endDate = `${nextYear}-${String(nextMonth).padStart(2,'0')}-01`;
        const { data } = await _supabase.from('worklog').select('*')
          .gte('date', startDate)
          .lt('date', endDate);
        worklog = {};
        (data || []).forEach(r => { worklog[`${r.emp_id}_${r.date}`] = r; });
      }

      async function loadSalaryParams() {
        const monthStr = `${currentYear}-${String(currentMonth).padStart(2,'0')}`;
        const { data } = await _supabase.from('salary_params').select('*').eq('month', monthStr);
        salaryParams = {};
        (data || []).forEach(r => { salaryParams[r.emp_id] = r; });
      }

      function renderFilterDropdown() {
        const dd = document.getElementById('empDropdown');
        dd.innerHTML = employees.map(e => `
          <label class="emp-dropdown-item">
            <input type="checkbox" value="${e.id}" ${selectedEmployeeId === e.id ? 'checked' : ''} onchange="selectEmployee('${e.id}', this.checked)">
            ${e.name} (${e.role})
          </label>
        `).join('');
      }
      window.selectEmployee = function(id, checked) {
        if (checked) {
          selectedEmployeeId = id;
          document.querySelectorAll('#empDropdown input').forEach(cb => {
            if (cb.value !== id) cb.checked = false;
          });
        } else {
          selectedEmployeeId = null;
        }
        renderSchedule();
      };

      // Норма дней для графиков
      function getNormDays(role, params) {
        const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
        if (role === 'Менеджер') {
          // график 3/3
          let count = 0;
          for (let d = 1; d <= daysInMonth; d++) if ((d - 1) % 6 < 3) count++;
          return count;
        }
        if (role === 'Администратор') {
          // график 2/2 (по умолчанию)
          let count = 0;
          for (let d = 1; d <= daysInMonth; d++) if ((d - 1) % 4 < 2) count++;
          return params.norm_days || count; // можно переопределить в настройках
        }
        return params.norm_days || 22; // для остальных
      }

      function getSalary(emp) {
        const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
        let worked = 0, indiv = 0, group = 0, sales = 0;
        for (let d = 1; d <= daysInMonth; d++) {
          const dateStr = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const rec = worklog[`${emp.id}_${dateStr}`];
          if (!rec || rec.status !== 'working') continue;
          if (emp.role === 'Менеджер') sales += rec.daily_sales || 0;
          if ((currentPeriod === 'full') || (currentPeriod === 'first' && d <= 15) || (currentPeriod === 'second' && d >= 16)) {
            worked++;
            if (emp.role === 'Преподаватель') {
              indiv += rec.indiv || 0;
              group += rec.group_total || 0;
            }
          }
        }

        const params = salaryParams[emp.id] || {};
        const norm = getNormDays(emp.role, params);
        const rates = { 'Менеджер': 20000, 'Администратор': 25000, 'Управляющий': 50000 };
        const dailyRate = (rates[emp.role] || 0) / norm;
        let base = dailyRate * worked;

        if (emp.role === 'Преподаватель') {
          const iRate = params.indiv_rate || 400;
          const gRate = params.group_rate || 500;
          return indiv * iRate + group * gRate;
        }
        if (emp.role === 'Менеджер') {
          const plan = params.plan_amount || 0;
          const bonusPercent = (plan > 0 && sales >= plan) ? 7 : 5;
          const bonus = currentPeriod === 'first' ? 0 : sales * bonusPercent / 100;
          return base + bonus;
        }
        if (emp.role === 'Администратор') {
          const managersSales = employees.filter(e => e.role === 'Менеджер')
            .reduce((sum, m) => sum + getFullMonthSales(m), 0);
          const bonus = currentPeriod !== 'first' ? managersSales * 0.01 : 0;
          return base + bonus;
        }
        if (emp.role === 'Управляющий') {
          const managersSales = employees.filter(e => e.role === 'Менеджер')
            .reduce((sum, m) => sum + getFullMonthSales(m), 0);
          const plan = params.plan_amount || 0;
          const bonus = (plan > 0 && managersSales >= plan && currentPeriod !== 'first') ? managersSales * 0.01 : 0;
          return base + bonus;
        }
        return base;
      }

      function getFullMonthSales(emp) {
        const days = new Date(currentYear, currentMonth, 0).getDate();
        let total = 0;
        for (let d = 1; d <= days; d++) {
          const key = `${emp.id}_${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const rec = worklog[key];
          if (rec && rec.status === 'working') total += rec.daily_sales || 0;
        }
        return total;
      }

      function renderSchedule() {
        const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
        document.getElementById('monthTitle').textContent =
          new Date(currentYear, currentMonth - 1, 1).toLocaleDateString('ru', { month: 'long', year: 'numeric' });

        const filtered = selectedEmployeeId
          ? employees.filter(e => e.id === selectedEmployeeId)
          : employees;

        const container = document.getElementById('scheduleContainer');
        if (!filtered.length) {
          container.innerHTML = '<p style="color:#636e72; text-align:center; padding:2rem;">Выберите сотрудников</p>';
          return;
        }

        let html = '<table><thead><tr><th class="employee-name">Сотрудник</th>';
        for (let d = 1; d <= daysInMonth; d++) {
          html += `<th>${d}</th>`;
        }
        html += '<th>Смен</th><th>ЗП</th></tr></thead><tbody>';

        filtered.forEach(emp => {
          let cells = '', worked = 0;
          for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const rec = worklog[`${emp.id}_${dateStr}`] || {};
            const status = rec.status || '';
            if (status === 'working' && ((currentPeriod === 'full') || (currentPeriod === 'first' && d <= 15) || (currentPeriod === 'second' && d >= 16))) {
              worked++;
            }
            cells += `<td class="day-cell ${status}" data-emp="${emp.id}" data-date="${dateStr}">${status === 'working' ? 'Д' : status === 'dayoff' ? 'В' : ''}</td>`;
          }
          const salary = getSalary(emp);
          const isOwner = currentUserEmail === OWNER_EMAIL;
          const displaySalary = (emp.role === 'Управляющий' && !isOwner) ? '***' : `${salary.toFixed(0)} ₽`;
          html += `<tr>
            <td class="employee-name" data-emp="${emp.id}">${emp.name}</td>
            ${cells}
            <td class="summary-cell">${worked}</td>
            <td class="summary-cell">${displaySalary}</td>
          </tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;

        // Обработчики клика по ячейке
        container.querySelectorAll('.day-cell').forEach(cell => {
          cell.addEventListener('click', () => openDayModal(cell.dataset.emp, cell.dataset.date));
        });
        // Клик по имени сотрудника
        container.querySelectorAll('.employee-name').forEach(el => {
          el.addEventListener('click', () => openSalaryModal(el.dataset.emp));
        });
      }

      function openDayModal(empId, date) {
        const emp = employees.find(e => e.id === empId);
        if (!emp) return;
        const rec = worklog[`${empId}_${date}`] || {};
        document.getElementById('dayModalTitle').textContent = `${emp.name} – ${date}`;
        document.getElementById('dayStatus').value = rec.status || '';
        document.getElementById('dayComment').value = rec.comment || '';
        document.getElementById('dayDynamicFields').innerHTML = emp.role === 'Менеджер'
          ? `<input type="number" id="dailySales" value="${rec.daily_sales || ''}" placeholder="Выручка">`
          : (emp.role === 'Преподаватель'
            ? `<div style="display:flex; gap:0.5rem;"><input type="number" id="indiv" value="${rec.indiv || ''}" placeholder="Инд."><input type="number" id="groupTotal" value="${rec.group_total || ''}" placeholder="Групп."></div>`
            : '');
        document.getElementById('dayModal').dataset.emp = empId;
        document.getElementById('dayModal').dataset.date = date;
        document.getElementById('dayModal').style.display = 'flex';
      }

      document.getElementById('saveDayBtn').addEventListener('click', async () => {
        const empId = document.getElementById('dayModal').dataset.emp;
        const date = document.getElementById('dayModal').dataset.date;
        const status = document.getElementById('dayStatus').value;
        const comment = document.getElementById('dayComment').value.trim();
        const data = { emp_id: empId, date, status, comment };
        if (document.getElementById('dailySales')) data.daily_sales = parseFloat(document.getElementById('dailySales').value) || 0;
        if (document.getElementById('indiv')) {
          data.indiv = parseInt(document.getElementById('indiv').value) || 0;
          data.group_total = parseInt(document.getElementById('groupTotal').value) || 0;
        }
        const { error } = await _supabase.from('worklog').upsert(data, { onConflict: 'emp_id, date' });
        if (error) { alert('Ошибка: ' + error.message); return; }
        document.getElementById('dayModal').style.display = 'none';
        await loadWorklog();
        renderSchedule();
      });

      document.getElementById('cancelDayBtn').addEventListener('click', () => document.getElementById('dayModal').style.display = 'none');

      function openSalaryModal(empId) {
        const emp = employees.find(e => e.id === empId);
        if (!emp) return;
        if (emp.role === 'Управляющий' && currentUserEmail !== OWNER_EMAIL) {
          document.getElementById('salaryContent').innerHTML = '<p>Только для руководства</p>';
          document.getElementById('salaryModal').style.display = 'flex';
          return;
        }
        const params = salaryParams[empId] || {};
        let html = `<p><b>${emp.name}</b> (${emp.role})</p>`;
        // Оклад (фиксированный для ролей с окладом)
        const rates = { 'Менеджер': 20000, 'Администратор': 25000, 'Управляющий': 50000 };
        if (rates[emp.role]) {
          html += `<div class="label-row"><span>Оклад:</span><strong>${rates[emp.role]} ₽</strong></div>`;
        }
        // График
        html += `<select id="salaryGraph">
          <option value="2/2" ${emp.role === 'Администратор' ? 'selected' : ''}>2/2</option>
          <option value="3/3" ${emp.role === 'Менеджер' ? 'selected' : ''}>3/3</option>
          <option value="5/2">5/2 (стандарт)</option>
        </select>`;
        // Норма дней
        html += `<div class="label-row"><span>Норма дней:</span><input type="number" id="normDays" value="${params.norm_days || getNormDays(emp.role, params)}" style="width:80px;"></div>`;
        // KPI / план
        if (emp.role === 'Менеджер' || emp.role === 'Управляющий') {
          html += `<div class="label-row"><span>План продаж:</span><input type="number" id="planAmount" value="${params.plan_amount || ''}" style="width:120px;"></div>`;
        }
        if (emp.role === 'Преподаватель') {
          html += `<div class="label-row"><span>Ставка инд.:</span><input type="number" id="indivRate" value="${params.indiv_rate || 400}" style="width:80px;"></div>`;
          html += `<div class="label-row"><span>Ставка групп.:</span><input type="number" id="groupRate" value="${params.group_rate || 500}" style="width:80px;"></div>`;
        }
        if (emp.role === 'Администратор') {
          const managersSales = employees.filter(e => e.role === 'Менеджер')
            .reduce((sum, m) => sum + getFullMonthSales(m), 0);
          html += `<div class="label-row"><span>Продажи менеджеров:</span><strong>${managersSales.toLocaleString()} ₽</strong></div>`;
          html += `<div class="label-row"><span>KPI (1%):</span><strong>${(managersSales * 0.01).toFixed(0)} ₽</strong></div>`;
        }
        document.getElementById('salaryContent').innerHTML = html;
        document.getElementById('salaryModal').dataset.emp = empId;
        document.getElementById('salaryModal').style.display = 'flex';
      }

      document.getElementById('saveSalaryBtn').addEventListener('click', async () => {
        const empId = document.getElementById('salaryModal').dataset.emp;
        const emp = employees.find(e => e.id === empId);
        if (!emp) return;
        const monthStr = `${currentYear}-${String(currentMonth).padStart(2,'0')}`;
        const normDays = parseInt(document.getElementById('normDays')?.value) || getNormDays(emp.role, salaryParams[empId] || {});
        const planAmount = parseFloat(document.getElementById('planAmount')?.value) || null;
        const indivRate = parseInt(document.getElementById('indivRate')?.value) || null;
        const groupRate = parseInt(document.getElementById('groupRate')?.value) || null;
        const data = {
          emp_id: empId,
          month: monthStr,
          norm_days: normDays,
          plan_amount: planAmount,
          indiv_rate: indivRate,
          group_rate: groupRate
        };
        const { error } = await _supabase.from('salary_params').upsert(data, { onConflict: 'emp_id, month' });
        if (error) { alert('Ошибка: ' + error.message); return; }
        document.getElementById('salaryModal').style.display = 'none';
        await loadSalaryParams();
        renderSchedule();
      });

      document.getElementById('cancelSalaryBtn').addEventListener('click', () => document.getElementById('salaryModal').style.display = 'none');

      // Навигация по месяцам
      document.getElementById('prevMonthBtn').addEventListener('click', () => {
        currentMonth--;
        if (currentMonth < 1) { currentMonth = 12; currentYear--; }
        loadWorklog().then(renderSchedule);
      });
      document.getElementById('nextMonthBtn').addEventListener('click', () => {
        currentMonth++;
        if (currentMonth > 12) { currentMonth = 1; currentYear++; }
        loadWorklog().then(renderSchedule);
      });

      // Фильтр периода
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          currentPeriod = this.dataset.period;
          renderSchedule();
        });
      });

      // Выпадающий список сотрудников
      document.getElementById('empFilterBtn').addEventListener('click', () => {
        document.getElementById('empDropdown').classList.toggle('open');
      });
      document.addEventListener('click', (e) => {
        if (!e.target.closest('#empFilterWrap')) document.getElementById('empDropdown').classList.remove('open');
      });

      // Экспорт
      document.getElementById('exportBtn').addEventListener('click', () => {
        const table = document.querySelector('table');
        if (!table) return;
        const wb = XLSX.utils.table_to_book(table, { sheet: 'График' });
        XLSX.writeFile(wb, `График_${currentYear}-${String(currentMonth).padStart(2,'0')}.xlsx`);
      });

      init();
    })();
  </script>
</body>
</html>
