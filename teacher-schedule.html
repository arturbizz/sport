<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>Доступность преподавателей — Music Club Орёл</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --violet: #7c5ce7;
      --teal: #0fb9b1;
      --gold: #f9ca24;
      --rose: #ff8c94;
      --green: #55efc4;
      --bg: #fef9f0;
      --surface: rgba(255,255,255,0.85);
      --text: #2d3436;
      --text-light: #636e72;
      --border: #e0e0e0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, .container, .header, .modal {
      -webkit-user-select: none; user-select: none; cursor: default;
    }
    input, textarea, select {
      -webkit-user-select: text; user-select: text; cursor: text;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #fef9f0 0%, #f0f7f5 100%);
      color: var(--text);
      padding: 1.5rem;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      position: relative;
      overflow-x: hidden;
    }
    .music-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .note {
      position: absolute;
      font-size: 2rem;
      color: rgba(124,92,231,0.08);
      animation: floatNote 12s infinite ease-in-out;
    }
    .note::before { content: '♪'; }
    .note.two::before { content: '♫'; }
    .note.three::before { content: '♩'; }
    @keyframes floatNote {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
      50% { transform: translateY(-30px) rotate(8deg); opacity: 0.7; }
      100% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
    }

    .container {
      position: relative; z-index: 2;
      width: 100%; max-width: 1200px;
      background: var(--surface);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 8px 30px rgba(0,0,0,0.04);
      border: 1px solid rgba(255,255,255,0.6);
    }
    .header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;
    }
    .back-link { color: var(--violet); text-decoration: none; font-weight: 600; font-size: 0.9rem; }
    h1 {
      font-size: 2rem; font-weight: 700;
      background: linear-gradient(135deg, var(--violet), var(--gold), var(--teal));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .btn {
      border: 1px solid var(--violet); padding: 0.55rem 1.4rem; border-radius: 14px;
      font-weight: 600; cursor: pointer; font-size: 0.9rem;
      transition: all 0.3s; display: inline-flex; align-items: center; gap: 0.4rem;
      background: transparent; color: var(--violet);
      box-shadow: 0 2px 6px rgba(0,0,0,0.03);
    }
    .btn:hover {
      background: linear-gradient(135deg, var(--violet), var(--teal));
      color: white; border-color: transparent;
      box-shadow: 0 6px 14px rgba(124,92,231,0.2);
      transform: translateY(-1px);
    }
    .btn-outline { background: transparent; border: 1px solid var(--violet); color: var(--violet); }
    .btn-outline:hover { background: var(--violet); color: white; }
    .btn:disabled { opacity: 0.4; cursor: default; }

    .toolbar {
      display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;
      margin-bottom: 2rem;
    }
    .search-wrapper {
      position: relative;
      flex: 1;
      min-width: 250px;
    }
    .search-wrapper input {
      width: 100%;
      padding: 0.5rem 1rem;
      border-radius: 14px;
      border: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .search-results {
      position: absolute;
      top: 100%; left: 0; right: 0;
      background: white;
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
      z-index: 10;
      display: none;
      max-height: 200px;
      overflow-y: auto;
    }
    .search-results.open { display: block; }
    .search-item {
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-size: 0.9rem;
      border-bottom: 1px solid #f0f0f0;
    }
    .search-item:hover { background: #f4f0ff; }

    .month-nav {
      display: flex; align-items: center; gap: 0.5rem;
    }
    .month-nav button {
      background: white; border: 1px solid var(--border);
      padding: 0.4rem 1rem; border-radius: 12px;
      font-weight: 600; cursor: pointer; font-size: 0.9rem;
      transition: 0.2s;
    }
    .month-nav button:hover { border-color: var(--violet); color: var(--violet); }
    .month-title {
      min-width: 140px; text-align: center; font-weight: 600;
      background: white; padding: 0.4rem 1rem; border-radius: 12px;
      border: 1px solid var(--border);
    }

    .calendar-container {
      overflow-x: auto;
      background: white;
      border-radius: 16px;
      border: 1px solid var(--border);
      margin-top: 1rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }
    th, td {
      text-align: center;
      padding: 0.6rem 0.3rem;
      font-size: 0.85rem;
      border: 1px solid #f0f0f0;
      height: 50px;
    }
    th {
      background: #fafafa;
      color: var(--text-light);
      font-weight: 600;
      position: sticky; top: 0; z-index: 3;
    }
    .day-cell {
      cursor: pointer;
      transition: 0.2s;
      vertical-align: top;
      text-align: left;
      padding: 0.3rem;
      position: relative;
    }
    .day-cell:hover {
      background: #f4f0ff;
    }
    .day-cell.available { background: rgba(85,239,196,0.25); }
    .day-cell.unavailable { background: rgba(255,140,148,0.25); }
    .day-cell.by_agreement { background: rgba(249,202,36,0.25); }

    .slot-indicator {
      font-size: 0.65rem;
      padding: 0.1rem 0.3rem;
      border-radius: 6px;
      margin: 2px 0;
      white-space: nowrap;
      cursor: pointer;
      border-left: 2px solid;
    }
    .slot-indicator.available { background: #d1fae5; border-color: var(--green); color: #065f46; }
    .slot-indicator.unavailable { background: #ffe0e0; border-color: var(--rose); color: #991b1b; }
    .slot-indicator.by_agreement { background: #fef3c7; border-color: var(--gold); color: #92400e; }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.35);
      backdrop-filter: blur(4px); display: flex;
      align-items: center; justify-content: center; z-index: 1000;
    }
    .modal {
      background: white; border-radius: 24px; padding: 2rem;
      max-width: 400px; width: 90%;
      box-shadow: 0 20px 50px rgba(0,0,0,0.12);
      animation: slideUp 0.25s ease-out;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); }
    }
    input, textarea, select {
      width: 100%; padding: 0.6rem; margin: 0.5rem 0;
      border: 1px solid var(--border); border-radius: 10px;
      font-size: 0.9rem; font-family: inherit;
    }
    .time-row {
      display: flex; gap: 0.5rem; align-items: center;
    }
    .time-row input { flex: 1; }

    @media (max-width: 600px) {
      body { padding: 0.5rem; }
      .container { padding: 1rem; }
    }
  </style>
</head>
<body>
  <div class="music-bg">
    <div class="note" style="top:10%; left:5%;"></div>
    <div class="note two" style="top:25%; right:10%;"></div>
    <div class="note three" style="bottom:20%; left:15%;"></div>
  </div>

  <div class="container">
    <div class="header">
      <a href="index.html" class="back-link">← На главную</a>
      <h1>Доступность преподавателей</h1>
    </div>

    <div class="toolbar">
      <div class="search-wrapper" id="searchWrapper">
        <input type="text" id="teacherSearch" placeholder="Поиск преподавателя...">
        <div class="search-results" id="searchResults"></div>
      </div>
      <div class="month-nav">
        <button id="prevMonthBtn">◀</button>
        <span class="month-title" id="monthTitle"></span>
        <button id="nextMonthBtn">▶</button>
      </div>
    </div>

    <div id="calendarContainer" class="calendar-container"></div>
  </div>

  <!-- Модалка настройки дня -->
  <div class="modal-overlay" id="settingModal" style="display:none;">
    <div class="modal">
      <h2 id="settingModalTitle" style="background:linear-gradient(135deg,var(--violet),var(--teal)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">Настройка дня</h2>
      <p id="settingDayInfo"></p>
      <select id="settingType">
        <option value="available">Доступен</option>
        <option value="unavailable">Недоступен</option>
        <option value="by_agreement">По согласованию</option>
      </select>
      <div class="time-row">
        <input type="time" id="settingStart" placeholder="Начало">
        <input type="time" id="settingEnd" placeholder="Конец">
      </div>
      <textarea id="settingNote" rows="2" placeholder="Примечание"></textarea>
      <div style="display:flex; gap:0.5rem; margin-top:1rem;">
        <button class="btn" id="saveSettingBtn">Сохранить</button>
        <button class="btn btn-outline" id="cancelSettingBtn">Отмена</button>
        <button class="btn btn-outline" id="deleteSettingBtn" style="display:none;">Удалить</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const SUPABASE_URL = 'https://ujsakubqnirmpdwmmtju.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqc2FrdWJxbmlybXBkd21tdGp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNDUwOTEsImV4cCI6MjA5ODgyMTA5MX0.8YZCsCpjroirJvKuQie76qXtpOvpmpE7dQoz2G502p4';
      const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      let currentUserEmail = null, teachers = [], settings = [];
      let currentYear, currentMonth, selectedTeacherId = null;

      async function init() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (!session) { window.location.href = 'login.html'; return; }
        currentUserEmail = session.user.email;
        const now = new Date();
        currentYear = now.getFullYear();
        currentMonth = now.getMonth() + 1;
        await loadTeachers();
        renderCalendar();
      }

      async function loadTeachers() {
        const { data } = await _supabase.from('employees').select('*').eq('role', 'Преподаватель');
        teachers = data || [];
      }

      async function selectTeacher(id) {
        selectedTeacherId = id;
        document.getElementById('searchResults').classList.remove('open');
        document.getElementById('teacherSearch').value = teachers.find(t => t.id === id)?.name || '';
        await loadTeacherSettings();
        renderCalendar();
      }

      async function loadTeacherSettings() {
        if (!selectedTeacherId) { settings = []; return; }
        const { data } = await _supabase.from('teacher_settings').select('*').eq('teacher_id', selectedTeacherId);
        settings = data || [];
      }

      function getDayStatus(dateStr) {
        const date = new Date(dateStr);
        const dayOfWeek = date.getDay(); // 0=Вс, 1=Пн, ...
        const rule = settings.find(s => s.day_of_week === dayOfWeek);
        if (rule) {
          return {
            type: rule.type,
            start: rule.start_time,
            end: rule.end_time,
            note: rule.note,
            id: rule.id,
            isOverride: false
          };
        }
        return { type: 'available', start: null, end: null, note: '', id: null, isOverride: false };
      }

      function renderCalendar() {
        if (!selectedTeacherId) {
          document.getElementById('calendarContainer').innerHTML = '<p style="color:#636e72; text-align:center;">Выберите преподавателя для отображения графика</p>';
          return;
        }

        const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
        document.getElementById('monthTitle').textContent =
          new Date(currentYear, currentMonth - 1, 1).toLocaleDateString('ru', { month: 'long', year: 'numeric' });

        const container = document.getElementById('calendarContainer');
        let html = '<table><thead><tr><th>Пн</th><th>Вт</th><th>Ср</th><th>Чт</th><th>Пт</th><th>Сб</th><th>Вс</th></tr></thead><tbody><tr>';

        const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
        const startOffset = firstDay === 0 ? 6 : firstDay - 1;

        for (let i = 0; i < startOffset; i++) {
          html += '<td></td>';
        }

        for (let d = 1; d <= daysInMonth; d++) {
          const dateStr = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const status = getDayStatus(dateStr);
          const cellClass = `day-cell ${status.type}`;
          let cellContent = `<strong>${d}</strong>`;
          if (status.id) {
            const label = status.type === 'available' ? 'Доступен' : status.type === 'unavailable' ? 'Недоступен' : 'По согласованию';
            cellContent += `<div class="slot-indicator ${status.type}" data-id="${status.id}" data-date="${dateStr}" data-type="${status.type}" data-start="${status.start || ''}" data-end="${status.end || ''}" data-note="${status.note || ''}">${label}</div>`;
          }
          html += `<td class="${cellClass}" data-date="${dateStr}">${cellContent}</td>`;

          if ((startOffset + d) % 7 === 0) {
            html += '</tr><tr>';
          }
        }
        html += '</tr></tbody></table>';
        container.innerHTML = html;

        // Клик по ячейке дня
        container.querySelectorAll('.day-cell').forEach(cell => {
          cell.addEventListener('click', (e) => {
            if (e.target.classList.contains('slot-indicator')) return;
            const dateStr = cell.dataset.date;
            openSettingModal(dateStr);
          });
        });

        // Клик по индикатору
        container.querySelectorAll('.slot-indicator').forEach(ind => {
          ind.addEventListener('click', (e) => {
            e.stopPropagation();
            const id = ind.dataset.id;
            const date = ind.dataset.date;
            const type = ind.dataset.type;
            const start = ind.dataset.start;
            const end = ind.dataset.end;
            const note = ind.dataset.note;
            openSettingModal(date, { id, type, start_time: start, end_time: end, note });
          });
        });
      }

      function openSettingModal(dateStr, existing = null) {
        const date = new Date(dateStr);
        const dayOfWeek = date.getDay();
        const dayNames = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
        document.getElementById('settingDayInfo').textContent = `${dateStr} (${dayNames[dayOfWeek]})`;
        document.getElementById('settingType').value = existing ? existing.type : 'available';
        document.getElementById('settingStart').value = existing ? (existing.start_time || '') : '';
        document.getElementById('settingEnd').value = existing ? (existing.end_time || '') : '';
        document.getElementById('settingNote').value = existing ? (existing.note || '') : '';
        document.getElementById('deleteSettingBtn').style.display = existing ? 'inline-block' : 'none';
        document.getElementById('settingModal').dataset.editId = existing ? existing.id : '';
        document.getElementById('settingModal').dataset.date = dateStr;
        document.getElementById('settingModal').dataset.dayOfWeek = dayOfWeek;
        document.getElementById('settingModal').style.display = 'flex';
      }

      document.getElementById('saveSettingBtn').addEventListener('click', async () => {
        const dateStr = document.getElementById('settingModal').dataset.date;
        const dayOfWeek = parseInt(document.getElementById('settingModal').dataset.dayOfWeek);
        const type = document.getElementById('settingType').value;
        const start = document.getElementById('settingStart').value;
        const end = document.getElementById('settingEnd').value;
        const note = document.getElementById('settingNote').value.trim();
        const editId = document.getElementById('settingModal').dataset.editId;

        const data = {
          teacher_id: selectedTeacherId,
          day_of_week: dayOfWeek,
          type,
          start_time: start || null,
          end_time: end || null,
          note
        };

        let error;
        if (editId) {
          const { error: updateError } = await _supabase.from('teacher_settings').update(data).eq('id', editId);
          error = updateError;
        } else {
          const { error: insertError } = await _supabase.from('teacher_settings').insert([data]);
          error = insertError;
        }

        if (error) { alert('Ошибка: ' + error.message); return; }
        document.getElementById('settingModal').style.display = 'none';
        await loadTeacherSettings();
        renderCalendar();
      });

      document.getElementById('deleteSettingBtn').addEventListener('click', async () => {
        const editId = document.getElementById('settingModal').dataset.editId;
        if (!editId) return;
        const { error } = await _supabase.from('teacher_settings').delete().eq('id', editId);
        if (error) { alert('Ошибка: ' + error.message); return; }
        document.getElementById('settingModal').style.display = 'none';
        await loadTeacherSettings();
        renderCalendar();
      });

      document.getElementById('cancelSettingBtn').addEventListener('click', () => {
        document.getElementById('settingModal').style.display = 'none';
      });

      document.getElementById('teacherSearch').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const results = document.getElementById('searchResults');
        if (query.length === 0) {
          results.classList.remove('open');
          return;
        }
        const filtered = teachers.filter(t => t.name.toLowerCase().includes(query));
        if (filtered.length === 0) {
          results.innerHTML = '<div class="search-item">Никого не найдено</div>';
        } else {
          results.innerHTML = filtered.map(t => `<div class="search-item" data-id="${t.id}">${t.name}</div>`).join('');
        }
        results.classList.add('open');
      });

      document.getElementById('searchResults').addEventListener('click', (e) => {
        const item = e.target.closest('.search-item');
        if (!item || !item.dataset.id) return;
        selectTeacher(item.dataset.id);
      });

      document.addEventListener('click', (e) => {
        if (!e.target.closest('#searchWrapper')) {
          document.getElementById('searchResults').classList.remove('open');
        }
      });

      document.getElementById('prevMonthBtn').addEventListener('click', () => {
        currentMonth--;
        if (currentMonth < 1) { currentMonth = 12; currentYear--; }
        renderCalendar();
      });
      document.getElementById('nextMonthBtn').addEventListener('click', () => {
        currentMonth++;
        if (currentMonth > 12) { currentMonth = 1; currentYear++; }
        renderCalendar();
      });

      init();
    })();
  </script>
</body>
</html>
