<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>График отпусков — Music Club Орёл</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #ff8c94;
      --mint: #a0e7e5;
      --peach: #fad0c4;
      --sun: #ffd166;
      --bg: #fef9f0;
      --surface: rgba(255,255,255,0.9);
      --text: #2d3436;
      --text-light: #636e72;
      --border: #e0e0e0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, .container, .header, .modal {
      -webkit-user-select: none; user-select: none; cursor: default;
    }
    input, textarea {
      -webkit-user-select: text; user-select: text; cursor: text;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #fff0f0 0%, #fefce8 50%, #e0f7f5 100%);
      color: var(--text);
      padding: 1.5rem;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      position: relative;
      overflow-x: hidden;
    }
    .music-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .note {
      position: absolute;
      font-size: 2rem;
      color: rgba(255,140,148,0.12);
      animation: floatNote 10s infinite ease-in-out;
    }
    .note::before { content: '♪'; }
    .note.two::before { content: '♫'; }
    .note.three::before { content: '♩'; }
    @keyframes floatNote {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.5; }
      50% { transform: translateY(-25px) rotate(5deg); opacity: 0.9; }
      100% { transform: translateY(0) rotate(0deg); opacity: 0.5; }
    }

    .container {
      position: relative; z-index: 2;
      width: 100%; max-width: 1300px;
      background: var(--surface);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 1.5rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      border: 1px solid rgba(255,255,255,0.6);
    }
    .header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;
    }
    .back-link { color: var(--pink); text-decoration: none; font-weight: 600; font-size: 0.9rem; }
    h1 { font-size: 1.8rem; font-weight: 700; color: var(--pink); }

    .nav-arrows { display: flex; gap: 0.5rem; align-items: center; }
    .nav-arrows button {
      background: white; border: 1px solid var(--border); padding: 0.4rem 1rem;
      border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 0.9rem;
      transition: 0.2s;
    }
    .nav-arrows button:hover { border-color: var(--pink); color: var(--pink); }
    .month-title {
      min-width: 140px; text-align: center; font-weight: 600; font-size: 1rem;
      background: white; padding: 0.4rem 1rem; border-radius: 12px;
      border: 1px solid var(--border);
    }

    .filters {
      display: flex; gap: 0.8rem; flex-wrap: wrap;
      margin-bottom: 1.5rem; align-items: center;
    }
    .emp-filter-wrap { position: relative; }
    .emp-filter-btn {
      padding: 0.4rem 1.5rem 0.4rem 1rem; border-radius: 20px;
      border: 1px solid var(--border); background: white;
      cursor: pointer; font-size: 0.85rem; font-weight: 500;
      display: flex; align-items: center; gap: 0.5rem;
      transition: 0.2s; white-space: nowrap;
    }
    .emp-filter-btn::after { content: '▼'; font-size: 0.6rem; color: var(--text-light); }
    .emp-filter-btn:hover { border-color: var(--pink); }
    .emp-dropdown {
      position: absolute; top: 100%; left: 0; margin-top: 4px;
      background: white; border: 1px solid var(--border);
      border-radius: 14px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      z-index: 20; min-width: 220px; display: none;
      padding: 0.5rem; animation: fadeIn 0.2s ease;
    }
    .emp-dropdown.open { display: block; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .emp-dropdown-item {
      padding: 0.4rem 0.8rem; cursor: pointer;
      border-radius: 8px; font-size: 0.85rem; transition: 0.1s;
    }
    .emp-dropdown-item:hover { background: #ffebee; }
    .emp-dropdown-item.active { background: var(--pink); color: white; }

    .role-filters {
      display: flex; gap: 0.3rem; flex-wrap: wrap;
    }
    .role-btn {
      padding: 0.3rem 0.8rem; border-radius: 16px;
      border: 1px solid var(--border); background: white;
      cursor: pointer; font-size: 0.8rem; font-weight: 500;
      transition: 0.2s; white-space: nowrap;
    }
    .role-btn.active { background: var(--mint); border-color: var(--mint); color: #055b5c; }
    .role-btn:hover:not(.active) { border-color: var(--mint); }

    .calendar-container {
      overflow-x: auto;
      background: white;
      border-radius: 16px;
      border: 1px solid var(--border);
      margin-top: 1rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 750px;
    }
    th, td {
      text-align: center;
      padding: 0.5rem 0.3rem;
      font-size: 0.8rem;
      border: 1px solid #f0f0f0;
      height: 42px;
    }
    th {
      background: #fafafa;
      color: var(--text-light);
      font-weight: 600;
      position: sticky; top: 0; z-index: 3;
    }
    .employee-name {
      text-align: left;
      padding-left: 1rem;
      font-weight: 600;
      background: white;
      position: sticky; left: 0; z-index: 2;
      min-width: 180px;
      cursor: pointer; /* теперь кликабельно */
      transition: background 0.2s;
    }
    .employee-name:hover {
      background: #ffebee;
    }
    .day-cell {
      cursor: pointer;
      transition: 0.2s;
    }
    .day-cell:hover {
      background: #ffebee;
    }
    .day-cell.vacation {
      background: var(--mint);
      color: #055b5c;
      font-weight: 600;
    }
    .day-cell.multiple {
      background: var(--sun);
      color: #7d5a00;
      font-weight: 600;
    }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px); display: flex;
      align-items: center; justify-content: center; z-index: 1000;
    }
    .modal {
      background: white; border-radius: 24px; padding: 2rem;
      max-width: 500px; width: 90%;
      box-shadow: 0 25px 50px rgba(0,0,0,0.15);
      animation: slideUp 0.2s ease-out;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); }
    }
    input, textarea, select {
      width: 100%; padding: 0.6rem; margin: 0.5rem 0;
      border: 1px solid var(--border); border-radius: 10px;
      font-size: 0.9rem; font-family: inherit;
    }
    .btn {
      border: none; padding: 0.6rem 1.4rem; border-radius: 16px;
      font-weight: 600; cursor: pointer; font-size: 0.9rem;
      transition: all 0.3s; display: inline-flex; align-items: center; gap: 0.4rem;
      background: linear-gradient(135deg, var(--pink), var(--peach));
      color: white; box-shadow: 0 6px 12px rgba(255,140,148,0.3);
    }
    .btn:hover { box-shadow: 0 10px 20px rgba(255,140,148,0.5); transform: translateY(-2px); }
    .btn-outline { background: transparent; border: 2px solid var(--pink); color: var(--pink); }
    .btn-outline:hover { background: var(--pink); color: white; }

    .vacation-list {
      max-height: 400px; overflow-y: auto; margin: 1rem 0;
    }
    .vacation-item {
      padding: 0.5rem; border-bottom: 1px solid #f0f0f0;
      display: flex; justify-content: space-between; align-items: center;
    }
    .vacation-item:last-child { border-bottom: none; }

    @media (max-width: 600px) {
      body { padding: 0.5rem; }
      .container { padding: 1rem; }
      .employee-name { min-width: 120px; }
    }
  </style>
</head>
<body>
  <div class="music-bg">
    <div class="note" style="top:10%; left:5%;"></div>
    <div class="note two" style="top:25%; right:10%;"></div>
    <div class="note three" style="bottom:20%; left:15%;"></div>
  </div>

  <div class="container">
    <div class="header">
      <a href="index.html" class="back-link">← На главную</a>
      <h1>График отпусков</h1>
      <div class="nav-arrows">
        <button id="prevMonthBtn">◀</button>
        <span class="month-title" id="monthTitle"></span>
        <button id="nextMonthBtn">▶</button>
      </div>
    </div>

    <div class="filters">
      <div class="emp-filter-wrap" id="empFilterWrap">
        <div class="emp-filter-btn" id="empFilterBtn">Все сотрудники</div>
        <div class="emp-dropdown" id="empDropdown"><div class="emp-dropdown-item active" data-id="">Все сотрудники</div></div>
      </div>
      <div class="role-filters" id="roleFilters">
        <button class="role-btn active" data-role="all">Все</button>
        <button class="role-btn" data-role="Управляющий">Управляющие</button>
        <button class="role-btn" data-role="Менеджер">Менеджеры</button>
        <button class="role-btn" data-role="Администратор">Администраторы</button>
        <button class="role-btn" data-role="Преподаватель">Преподаватели</button>
      </div>
      <button class="btn" id="summaryBtn" style="margin-left:auto;">Сводка</button>
      <button class="btn" id="addVacationBtn">+ Добавить отпуск</button>
    </div>

    <div id="calendarContainer" class="calendar-container"></div>
  </div>

  <!-- Модалка отпуска -->
  <div class="modal-overlay" id="vacationModal" style="display:none;">
    <div class="modal">
      <h2 id="modalTitle">Новый отпуск</h2>
      <select id="employeeSelect"></select>
      <input type="date" id="startDate">
      <input type="date" id="endDate">
      <select id="vacationType">
        <option value="paid">Оплачиваемый</option>
        <option value="unpaid">Неоплачиваемый</option>
        <option value="sick">Больничный</option>
        <option value="other">Другое</option>
      </select>
      <textarea id="comment" rows="2" placeholder="Комментарий"></textarea>
      <div style="display:flex; gap:0.5rem; margin-top:1rem;">
        <button class="btn" id="saveVacationBtn">Сохранить</button>
        <button class="btn btn-outline" id="cancelVacationBtn">Отмена</button>
        <button class="btn btn-outline" id="deleteVacationBtn" style="display:none;">Удалить</button>
      </div>
    </div>
  </div>

  <!-- Модалка сводки -->
  <div class="modal-overlay" id="summaryModal" style="display:none;">
    <div class="modal">
      <h2>Отпуска в этом и следующем месяце</h2>
      <div class="vacation-list" id="summaryList"></div>
      <div style="display:flex; gap:0.5rem; margin-top:1rem;">
        <button class="btn btn-outline" id="closeSummaryBtn">Закрыть</button>
      </div>
    </div>
  </div>

  <!-- Кастомный confirm -->
  <div class="modal-overlay" id="confirmModal" style="display:none;">
    <div class="modal" style="max-width:350px; text-align:center;">
      <p id="confirmMessage"></p>
      <div style="display:flex; gap:1rem; justify-content:center; margin-top:1rem;">
        <button class="btn" id="confirmYesBtn">Да</button>
        <button class="btn btn-outline" id="confirmNoBtn">Нет</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const SUPABASE_URL = 'https://ujsakubqnirmpdwmmtju.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqc2FrdWJxbmlybXBkd21tdGp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNDUwOTEsImV4cCI6MjA5ODgyMTA5MX0.8YZCsCpjroirJvKuQie76qXtpOvpmpE7dQoz2G502p4';
      const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      let currentUserEmail = null, employees = [], vacations = [];
      let currentYear, currentMonth, selectedEmployeeId = '', selectedRole = 'all';

      function showConfirm(msg) {
        return new Promise(resolve => {
          document.getElementById('confirmMessage').textContent = msg;
          document.getElementById('confirmModal').style.display = 'flex';
          document.getElementById('confirmYesBtn').onclick = () => {
            document.getElementById('confirmModal').style.display = 'none';
            resolve(true);
          };
          document.getElementById('confirmNoBtn').onclick = () => {
            document.getElementById('confirmModal').style.display = 'none';
            resolve(false);
          };
        });
      }

      function showConfetti() {
        const balloon = document.createElement('div');
        balloon.className = 'balloon';
        document.body.appendChild(balloon);
        balloon.addEventListener('animationend', () => {
          balloon.remove();
          for (let i = 0; i < 60; i++) {
            const p = document.createElement('div');
            p.className = 'confetti-piece';
            p.style.background = ['#ff8c94','#a0e7e5','#fad0c4','#ffd166','#ffb3ba'][i%5];
            p.style.left = '50%';
            p.style.top = '30%';
            p.style.setProperty('--x', (Math.random()*300-150)+'px');
            p.style.setProperty('--y', (Math.random()*-200-50)+'px');
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
          }
        });
      }

      async function init() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (!session) { window.location.href = 'login.html'; return; }
        currentUserEmail = session.user.email;
        const now = new Date();
        currentYear = now.getFullYear();
        currentMonth = now.getMonth() + 1;
        await loadEmployees();
        await loadVacations();
        renderEmpDropdown();
        renderCalendar();
      }

      async function loadEmployees() {
        const { data } = await _supabase.from('employees').select('*');
        employees = data || [];
        const select = document.getElementById('employeeSelect');
        select.innerHTML = employees.map(e => `<option value="${e.id}">${e.name} (${e.role})</option>`).join('');
      }

      async function loadVacations() {
        const startDate = `${currentYear}-${String(currentMonth).padStart(2,'0')}-01`;
        const nextMonth = currentMonth === 12 ? 1 : currentMonth + 1;
        const nextYear = currentMonth === 12 ? currentYear + 1 : currentYear;
        const endDate = `${nextYear}-${String(nextMonth).padStart(2,'0')}-01`;
        const { data, error } = await _supabase.from('vacations').select('*')
          .gte('start_date', startDate)
          .lt('start_date', endDate);
        if (error) { console.error(error); return; }
        vacations = data || [];
      }

      function renderEmpDropdown() {
        const dd = document.getElementById('empDropdown');
        dd.innerHTML = `<div class="emp-dropdown-item ${selectedEmployeeId === '' ? 'active' : ''}" data-id="">Все сотрудники</div>` +
          employees.map(e => `<div class="emp-dropdown-item ${selectedEmployeeId === e.id ? 'active' : ''}" data-id="${e.id}">${e.name}</div>`).join('');
        dd.querySelectorAll('.emp-dropdown-item').forEach(item => {
          item.addEventListener('click', () => {
            selectedEmployeeId = item.dataset.id;
            document.getElementById('empFilterBtn').textContent = item.textContent.trim();
            dd.classList.remove('open');
            renderEmpDropdown();
            renderCalendar();
          });
        });
      }

      function getFilteredEmployees() {
        let filtered = employees;
        if (selectedEmployeeId) {
          filtered = filtered.filter(e => e.id === selectedEmployeeId);
        }
        if (selectedRole !== 'all') {
          filtered = filtered.filter(e => e.role === selectedRole);
        }
        return filtered;
      }

      function renderCalendar() {
        const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
        document.getElementById('monthTitle').textContent =
          new Date(currentYear, currentMonth - 1, 1).toLocaleDateString('ru', { month: 'long', year: 'numeric' });

        const container = document.getElementById('calendarContainer');
        let html = '<table><thead><tr><th class="employee-name">Сотрудник</th>';
        for (let d = 1; d <= daysInMonth; d++) {
          html += `<th>${d}</th>`;
        }
        html += '</tr></thead><tbody>';

        const filteredEmployees = getFilteredEmployees();

        filteredEmployees.forEach(emp => {
          html += `<tr><td class="employee-name" data-emp="${emp.id}">${emp.name}</td>`;
          for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const cellVacations = vacations.filter(v => v.emp_id === emp.id && dateStr >= v.start_date && dateStr <= v.end_date);
            let cellClass = 'day-cell';
            if (cellVacations.length > 1) cellClass += ' multiple';
            else if (cellVacations.length === 1) cellClass += ' vacation';
            html += `<td class="${cellClass}" data-emp="${emp.id}" data-date="${dateStr}">${cellVacations.length > 0 ? 'О' : ''}</td>`;
          }
          html += '</tr>';
        });
        html += '</tbody></table>';
        container.innerHTML = html;

        // Клик по имени сотрудника — открыть модалку с этим сотрудником
        container.querySelectorAll('.employee-name').forEach(nameCell => {
          nameCell.addEventListener('click', () => {
            const empId = nameCell.dataset.emp;
            openVacationModal(empId, null, null);
          });
        });

        // Клик по дню — открыть модалку с датой (и существующим отпуском, если есть)
        container.querySelectorAll('.day-cell').forEach(cell => {
          cell.addEventListener('click', () => {
            const empId = cell.dataset.emp;
            const date = cell.dataset.date;
            const vacation = vacations.find(v => v.emp_id === empId && date >= v.start_date && date <= v.end_date);
            openVacationModal(empId, date, vacation);
          });
        });
      }

      function openVacationModal(empId, date, vacation) {
        document.getElementById('employeeSelect').value = empId || '';
        document.getElementById('startDate').value = vacation ? vacation.start_date : (date || '');
        document.getElementById('endDate').value = vacation ? vacation.end_date : (date || '');
        document.getElementById('vacationType').value = vacation ? vacation.type : 'paid';
        document.getElementById('comment').value = vacation ? vacation.comment : '';
        document.getElementById('deleteVacationBtn').style.display = vacation ? 'inline-block' : 'none';
        document.getElementById('modalTitle').textContent = vacation ? 'Редактирование отпуска' : 'Новый отпуск';
        document.getElementById('vacationModal').dataset.editId = vacation ? vacation.id : '';
        document.getElementById('vacationModal').style.display = 'flex';
      }

      document.getElementById('saveVacationBtn').addEventListener('click', async () => {
        const empId = document.getElementById('employeeSelect').value;
        if (!empId) { alert('Выберите сотрудника'); return; }
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        if (!startDate || !endDate) { alert('Выберите даты'); return; }
        const type = document.getElementById('vacationType').value;
        const comment = document.getElementById('comment').value.trim();
        const editId = document.getElementById('vacationModal').dataset.editId;

        const data = { emp_id: empId, start_date: startDate, end_date: endDate, type, comment };
        let error;
        if (editId) {
          const { error: updateError } = await _supabase.from('vacations').update(data).eq('id', editId);
          error = updateError;
        } else {
          const { error: insertError } = await _supabase.from('vacations').insert([data]);
          error = insertError;
        }
        if (error) { alert('Ошибка: ' + error.message); return; }
        document.getElementById('vacationModal').style.display = 'none';
        showConfetti();
        await loadVacations();
        renderCalendar();
      });

      document.getElementById('cancelVacationBtn').addEventListener('click', () => {
        document.getElementById('vacationModal').style.display = 'none';
      });

      document.getElementById('deleteVacationBtn').addEventListener('click', async () => {
        const editId = document.getElementById('vacationModal').dataset.editId;
        if (!editId) return;
        const confirmed = await showConfirm('Удалить отпуск?');
        if (!confirmed) return;
        const { error } = await _supabase.from('vacations').delete().eq('id', editId);
        if (error) { alert('Ошибка: ' + error.message); return; }
        document.getElementById('vacationModal').style.display = 'none';
        showConfetti();
        await loadVacations();
        renderCalendar();
      });

      document.getElementById('addVacationBtn').addEventListener('click', () => {
        openVacationModal('', '', null);
      });

      document.getElementById('empFilterBtn').addEventListener('click', () => {
        document.getElementById('empDropdown').classList.toggle('open');
      });
      document.addEventListener('click', (e) => {
        if (!e.target.closest('#empFilterWrap')) document.getElementById('empDropdown').classList.remove('open');
      });

      document.getElementById('roleFilters').addEventListener('click', (e) => {
        if (e.target.classList.contains('role-btn')) {
          document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          selectedRole = e.target.dataset.role;
          renderCalendar();
        }
      });

      document.getElementById('summaryBtn').addEventListener('click', async () => {
        const today = new Date();
        const thisMonthStart = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2,'0')}-01`;
        const nextMonth = today.getMonth() + 2;
        const nextYear = nextMonth > 12 ? today.getFullYear() + 1 : today.getFullYear();
        const nextMonthEnd = `${nextYear}-${String(nextMonth > 12 ? nextMonth - 12 : nextMonth).padStart(2,'0')}-01`;

        const { data } = await _supabase.from('vacations').select('*')
          .gte('end_date', thisMonthStart)
          .lt('start_date', nextMonthEnd);
        const list = document.getElementById('summaryList');
        if (!data || data.length === 0) {
          list.innerHTML = '<p>Нет отпусков в этом и следующем месяце</p>';
        } else {
          const grouped = {};
          data.forEach(v => {
            const emp = employees.find(e => e.id === v.emp_id);
            const name = emp ? emp.name : 'Сотрудник';
            if (!grouped[name]) grouped[name] = [];
            grouped[name].push(`${v.start_date} – ${v.end_date} (${v.type})`);
          });
          list.innerHTML = Object.entries(grouped).map(([name, dates]) =>
            `<div class="vacation-item"><strong>${name}</strong><span>${dates.join(', ')}</span></div>`
          ).join('');
        }
        document.getElementById('summaryModal').style.display = 'flex';
      });
      document.getElementById('closeSummaryBtn').addEventListener('click', () => {
        document.getElementById('summaryModal').style.display = 'none';
      });

      document.getElementById('prevMonthBtn').addEventListener('click', () => {
        currentMonth--;
        if (currentMonth < 1) { currentMonth = 12; currentYear--; }
        loadVacations().then(renderCalendar);
      });
      document.getElementById('nextMonthBtn').addEventListener('click', () => {
        currentMonth++;
        if (currentMonth > 12) { currentMonth = 1; currentYear++; }
        loadVacations().then(renderCalendar);
      });

      init();
    })();
  </script>
</body>
</html>
