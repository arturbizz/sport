<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Конкурсы — Music Club Орёл</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #0f172a;
      --text-secondary: #64748b;
      --accent: #3b82f6;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f0f4ff 0%, #ffffff 50%, #f0f9ff 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }
    .container {
      background: var(--surface);
      border-radius: 24px;
      padding: 3rem;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      max-width: 500px;
    }
    h1 {
      font-weight: 700;
      color: var(--text);
    }
    p {
      color: var(--text-secondary);
      margin: 1rem 0 2rem;
    }
    a {
      background: var(--accent);
      color: white;
      padding: 0.7rem 2rem;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s;
    }
    a:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Конкурсы</h1>
    <p>Модуль находится в разработке. Скоро здесь будут появляться задания, результаты и рейтинги учеников.</p>
    <a href="index.html">← На главную</a>
  </div>
</body>
</html>
