<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>NPS / Клиенты — Music Club Орёл</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --accent: #ff6b6b;
      --bg: #fef9f0;
      --surface: #ffffff;
      --text: #2d3436;
      --text-light: #636e72;
      --border: #e0e0e0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 1.5rem;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .container {
      width: 100%;
      max-width: 900px;
      background: var(--surface);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .back-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
    }
    h1 { font-size: 1.8rem; font-weight: 700; }
    .btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.7rem 1.5rem;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      transition: 0.2s;
      margin-left: 0.5rem;
    }
    .btn:hover { background: #ee5a24; }
    .btn:disabled { opacity: 0.6; cursor: default; }
    .error { color: #d63031; margin: 1rem 0; font-size: 0.9rem; }
    .info { color: #636e72; margin: 1rem 0; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
      font-size: 0.9rem;
    }
    th, td {
      text-align: left;
      padding: 0.8rem;
      border-bottom: 1px solid var(--border);
    }
    th { background: #f8f9fa; font-weight: 600; }
    @media (max-width: 600px) {
      body { padding: 0.8rem; }
      .container { padding: 1.2rem; }
      table, thead, tbody, th, td, tr { display: block; }
      thead tr { display: none; }
      tbody tr {
        margin-bottom: 1rem;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 0.8rem;
        background: #fafafa;
      }
      td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.4rem 0;
        border: none;
      }
      td::before {
        content: attr(data-label);
        font-weight: 600;
        color: var(--text-light);
        margin-right: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="index.html" class="back-link">← На главную</a>
      <h1>Клиенты с успешными визитами</h1>
      <div>
        <button class="btn" id="loadCsvBtn">📂 Загрузить из CSV</button>
      </div>
    </div>
    <div id="message"></div>
    <div id="tableContainer"></div>
    <input type="file" id="csvFileInput" accept=".csv" style="display:none">
  </div>

  <script>
    const SUPABASE_URL = 'https://ujsakubqnirmpdwmmtju.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqc2FrdWJxbmlybXBkd21tdGp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNDUwOTEsImV4cCI6MjA5ODgyMTA5MX0.8YZCsCpjroirJvKuQie76qXtpOvpmpE7dQoz2G502p4';
    const _supabaseNPS = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    (async () => {
      const { data: { session } } = await _supabaseNPS.auth.getSession();
      if (!session) {
        window.location.href = 'login.html';
        return;
      }
    })();

    const fileInput = document.getElementById('csvFileInput');
    const loadCsvBtn = document.getElementById('loadCsvBtn');
    const msg = document.getElementById('message');
    const tableContainer = document.getElementById('tableContainer');

    loadCsvBtn.addEventListener('click', () => {
      fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      msg.innerHTML = '';
      tableContainer.innerHTML = '';

      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const text = ev.target.result;
          const rows = text.split('\n').filter(r => r.trim());
          if (rows.length < 2) {
            msg.innerHTML = '<div class="error">Файл пуст или содержит только заголовки</div>';
            return;
          }

          // Определяем индексы столбцов по первой строке
          const headers = rows[0].split(',').map(h => h.trim().toLowerCase());
          const nameIdx = headers.findIndex(h => h.includes('имя') || h.includes('фио') || h.includes('name') || h.includes('клиент'));
          const phoneIdx = headers.findIndex(h => h.includes('телефон') || h.includes('phone'));
          const emailIdx = headers.findIndex(h => h.includes('email') || h.includes('почта'));

          if (nameIdx === -1) {
            msg.innerHTML = '<div class="error">Не найден столбец с именем/ФИО. Проверьте заголовки CSV.</div>';
            return;
          }

          const customers = [];
          for (let i = 1; i < rows.length; i++) {
            const cols = rows[i].split(',').map(c => c.trim());
            if (cols.length <= nameIdx) continue;
            customers.push({
              name: cols[nameIdx] || '—',
              phone: phoneIdx >= 0 ? cols[phoneIdx] : '—',
              email: emailIdx >= 0 ? cols[emailIdx] : '—'
            });
          }

          if (customers.length === 0) {
            msg.innerHTML = '<div class="info">Нет данных для отображения</div>';
            return;
          }

          // Удаляем дубликаты по имени (опционально)
          const unique = [];
          const seen = new Set();
          for (const c of customers) {
            if (!seen.has(c.name)) {
              seen.add(c.name);
              unique.push(c);
            }
          }

          let html = '<table><thead><tr><th>ФИО</th><th>Телефон</th><th>Email</th></tr></thead><tbody>';
          unique.forEach(c => {
            html += `<tr>
              <td data-label="ФИО">${c.name}</td>
              <td data-label="Телефон">${c.phone}</td>
              <td data-label="Email">${c.email}</td>
            </tr>`;
          });
          html += '</tbody></table>';
          tableContainer.innerHTML = html;
          msg.innerHTML = `<div class="info">Загружено ${unique.length} клиентов.</div>`;
        } catch (err) {
          msg.innerHTML = `<div class="error">Ошибка обработки файла: ${err.message}</div>`;
        }
      };
      reader.readAsText(file);
    });
  </script>
</body>
</html>
