<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>NPS / Клиенты — Music Club Орёл</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #ff6b6b;
      --bg: #fef9f0;
      --surface: #ffffff;
      --text: #2d3436;
      --text-light: #636e72;
      --border: #e0e0e0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #fff5f5 0%, #fefce8 50%, #f0f9ff 100%);
      color: var(--text);
      padding: 1.5rem;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      position: relative;
      overflow-x: hidden;
    }
    /* Музыкальные ноты на фоне (без эмодзи) */
    .music-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .note {
      position: absolute;
      font-size: 2rem;
      color: rgba(255,107,107,0.12);
      animation: floatNote 10s infinite ease-in-out;
    }
    .note::before { content: '♪'; }
    .note.two::before { content: '♫'; }
    .note.three::before { content: '♩'; }
    @keyframes floatNote {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.4; }
      50% { transform: translateY(-20px) rotate(5deg); opacity: 0.8; }
      100% { transform: translateY(0) rotate(0deg); opacity: 0.4; }
    }

    .container {
      position: relative; z-index: 2;
      width: 100%;
      max-width: 1100px;
      background: var(--surface);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .back-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
    }
    h1 { font-size: 1.8rem; font-weight: 700; }
    .btn {
      border: none;
      padding: 0.7rem 1.5rem;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: white;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    .btn:hover {
      box-shadow: 0 8px 15px rgba(255,107,107,0.3);
      transform: translateY(-2px);
    }
    .btn-outline {
      background: var(--surface);
      border: 2px solid var(--accent);
      color: var(--accent);
    }
    .btn-outline:hover {
      background: var(--accent);
      color: white;
    }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .error { color: #d63031; margin: 1rem 0; font-size: 0.9rem; }
    .info { color: #636e72; margin: 1rem 0; }

    .filter-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
      background: #fef9f0;
      padding: 0.8rem 1.2rem;
      border-radius: 16px;
      border: 1px solid #ffe0e0;
    }
    .filter-bar label {
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .filter-bar input[type="date"] {
      padding: 0.4rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
    }
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal {
      background: white;
      border-radius: 20px;
      padding: 2rem;
      max-width: 500px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
      font-size: 0.9rem;
    }
    th, td {
      text-align: left;
      padding: 0.6rem;
      border-bottom: 1px solid var(--border);
    }
    th { background: #f8f9fa; font-weight: 600; }
    @media (max-width: 600px) {
      body { padding: 0.8rem; }
      .container { padding: 1.2rem; }
      table, thead, tbody, th, td, tr { display: block; }
      thead tr { display: none; }
      tbody tr {
        margin-bottom: 1rem;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 0.8rem;
        background: #fafafa;
      }
      td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.4rem 0;
        border: none;
      }
      td::before {
        content: attr(data-label);
        font-weight: 600;
        color: var(--text-light);
        margin-right: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="music-bg">
    <div class="note" style="top:8%; left:5%; animation-delay:0s;"></div>
    <div class="note two" style="top:20%; right:10%; animation-delay:2s;"></div>
    <div class="note three" style="bottom:15%; left:15%; animation-delay:4s;"></div>
  </div>

  <div class="container">
    <div class="header">
      <a href="index.html" class="back-link">← На главную</a>
      <h1>Клиенты для NPS</h1>
      <div style="display:flex; gap:0.5rem;">
        <button class="btn" id="loadFileBtn">Загрузить файл (XLSX)</button>
        <button class="btn btn-outline" id="helpBtn">?</button>
        <button class="btn btn-outline" id="resetBtn" style="font-size:0.8rem;">Сбросить данные</button>
      </div>
    </div>

    <div class="filter-bar">
      <label>Показывать с даты:</label>
      <input type="date" id="cutoffDate" value="2026-06-01">
      <button class="btn" id="applyFilterBtn" style="padding:0.4rem 1rem;">Обновить</button>
      <span style="margin-left:auto; color:var(--text-light);" id="recordCount"></span>
    </div>

    <div id="message"></div>
    <div id="tableContainer"></div>

    <div style="display:flex; justify-content:flex-end; gap:0.5rem; margin-top:1rem;">
      <button class="btn btn-outline" id="exportBtn">Выгрузить в Excel</button>
    </div>

    <input type="file" id="fileInput" accept=".xlsx" style="display:none">
  </div>

  <!-- Модальное окно инструкции -->
  <div class="modal-overlay" id="helpModal" style="display:none;">
    <div class="modal">
      <h2>Как обновить данные</h2>
      <p style="margin:1rem 0; text-align:left;">
        1. Зайдите в CRM → раздел «Клиенты» (или «Отчёты»).<br>
        2. Постройте отчёт с полями: <b>ID, ФИО, Общий остаток (деньги), Общий остаток (уроки), Дата посл. посещения, Телефон, E-mail</b>.<br>
        3. Экспортируйте в Excel (XLSX).<br>
        4. Загрузите файл сюда.
      </p>
      <button class="btn" id="loadFromHelpBtn">Загрузить файл</button>
      <button class="btn btn-outline" id="closeHelpBtn" style="margin-left:0.5rem;">Закрыть</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ujsakubqnirmpdwmmtju.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqc2FrdWJxbmlybXBkd21tdGp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNDUwOTEsImV4cCI6MjA5ODgyMTA5MX0.8YZCsCpjroirJvKuQie76qXtpOvpmpE7dQoz2G502p4';
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Хранилище всех клиентов из последнего загруженного файла
    let allData = []; // [{name, phone, email, date}]

    const fileInput = document.getElementById('fileInput');
    const loadFileBtn = document.getElementById('loadFileBtn');
    const loadFromHelpBtn = document.getElementById('loadFromHelpBtn');
    const helpBtn = document.getElementById('helpBtn');
    const closeHelpBtn = document.getElementById('closeHelpBtn');
    const helpModal = document.getElementById('helpModal');
    const cutoffDateInput = document.getElementById('cutoffDate');
    const applyFilterBtn = document.getElementById('applyFilterBtn');
    const exportBtn = document.getElementById('exportBtn');
    const resetBtn = document.getElementById('resetBtn');
    const msg = document.getElementById('message');
    const tableContainer = document.getElementById('tableContainer');
    const recordCount = document.getElementById('recordCount');

    // Проверка авторизации и восстановление сохранённых данных
    (async () => {
      const { data: { session } } = await _supabase.auth.getSession();
      if (!session) {
        window.location.href = 'login.html';
        return;
      }
      // Восстанавливаем данные из localStorage
      const saved = localStorage.getItem('nps_allData');
      if (saved) {
        try {
          allData = JSON.parse(saved);
          // Восстанавливаем дату фильтра, если она была сохранена
          const savedDate = localStorage.getItem('nps_cutoffDate');
          if (savedDate) cutoffDateInput.value = savedDate;
          renderTable();
          msg.innerHTML = '<div class="info">Загружены ранее сохранённые данные.</div>';
        } catch (e) {}
      }
    })();

    // Открытие окна выбора файла
    function triggerFileInput() {
      fileInput.click();
    }

    loadFileBtn.addEventListener('click', triggerFileInput);
    loadFromHelpBtn.addEventListener('click', () => {
      helpModal.style.display = 'none';
      triggerFileInput();
    });

    helpBtn.addEventListener('click', () => {
      helpModal.style.display = 'flex';
    });

    closeHelpBtn.addEventListener('click', () => {
      helpModal.style.display = 'none';
    });

    // Обработка загруженного файла
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      msg.innerHTML = '';
      tableContainer.innerHTML = '';

      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = new Uint8Array(ev.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const firstSheet = workbook.SheetNames[0];
          const sheet = workbook.Sheets[firstSheet];
          const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

          // Поиск заголовков (строка с ID и ФИО)
          let headerRowIndex = -1;
          for (let i = 0; i < Math.min(rows.length, 10); i++) {
            const row = rows[i];
            if (!row) continue;
            const rowStr = row.map(c => String(c).trim().toLowerCase()).join(' ');
            if (rowStr.includes('id') && rowStr.includes('фио')) {
              headerRowIndex = i;
              break;
            }
          }
          if (headerRowIndex === -1) {
            msg.innerHTML = '<div class="error">Не найдена строка заголовков (ID, ФИО).</div>';
            return;
          }

          const headers = rows[headerRowIndex].map(h => String(h).trim().toLowerCase());
          const nameIdx = headers.findIndex(h => h.includes('фио') || h.includes('имя') || h.includes('клиент'));
          const phoneIdx = headers.findIndex(h => h.includes('телефон') || h.includes('phone'));
          const emailIdx = headers.findIndex(h => h.includes('e-mail') || h.includes('email') || h.includes('почта'));
          const dateIdx = headers.findIndex(h => h.includes('дата') && h.includes('посл'));

          if (nameIdx === -1 || dateIdx === -1) {
            msg.innerHTML = '<div class="error">Не найдены столбцы ФИО и/или Дата посл. посещения.</div>';
            return;
          }

          const parsed = [];
          for (let i = headerRowIndex + 1; i < rows.length; i++) {
            const cols = rows[i];
            if (!cols) continue;
            const dateStr = String(cols[dateIdx] || '').trim();
            if (!dateStr) continue;
            const parts = dateStr.split('-');
            if (parts.length !== 3) continue;
            const [year, month, day] = parts.map(Number);
            if (!year || !month || !day) continue;
            const visitDate = new Date(year, month - 1, day);
            const name = String(cols[nameIdx] || '').trim();
            if (!name) continue;
            parsed.push({
              name,
              phone: phoneIdx >= 0 ? String(cols[phoneIdx] || '').trim() : '',
              email: emailIdx >= 0 ? String(cols[emailIdx] || '').trim() : '',
              date: visitDate
            });
          }

          if (parsed.length === 0) {
            msg.innerHTML = '<div class="info">Нет клиентов в файле.</div>';
            return;
          }

          allData = parsed;
          // Автосохранение в localStorage
          localStorage.setItem('nps_allData', JSON.stringify(allData));
          localStorage.setItem('nps_cutoffDate', cutoffDateInput.value);
          renderTable();
          msg.innerHTML = `<div class="info">Загружено ${allData.length} клиентов. Данные сохранены в браузере.</div>`;
        } catch (err) {
          msg.innerHTML = `<div class="error">Ошибка обработки файла: ${err.message}</div>`;
        }
      };
      reader.readAsArrayBuffer(file);
    });

    // Отобразить таблицу, отфильтрованную по выбранной дате
    function renderTable() {
      const cutoff = new Date(cutoffDateInput.value);
      if (isNaN(cutoff)) {
        tableContainer.innerHTML = '<p class="info">Некорректная дата</p>';
        return;
      }

      const filtered = allData.filter(c => c.date >= cutoff);
      if (filtered.length === 0) {
        tableContainer.innerHTML = '<p class="info">Нет клиентов с указанной даты.</p>';
        recordCount.textContent = '';
        return;
      }

      let html = '<table><thead><tr><th>ФИО</th><th>Телефон</th><th>Email</th><th>Дата посл. посещения</th></tr></thead><tbody>';
      filtered.forEach(c => {
        const dateStr = c.date.toISOString().slice(0, 10);
        html += `<tr>
          <td data-label="ФИО">${c.name}</td>
          <td data-label="Телефон">${c.phone || '—'}</td>
          <td data-label="Email">${c.email || '—'}</td>
          <td data-label="Дата посл. посещения">${dateStr}</td>
        </tr>`;
      });
      html += '</tbody></table>';
      tableContainer.innerHTML = html;
      recordCount.textContent = `Показано ${filtered.length} из ${allData.length}`;
      // Сохраняем актуальную дату фильтра при каждой отрисовке
      localStorage.setItem('nps_cutoffDate', cutoffDateInput.value);
    }

    // Обработчики фильтра
    applyFilterBtn.addEventListener('click', renderTable);
    cutoffDateInput.addEventListener('change', renderTable);

    // Экспорт отфильтрованных данных
    exportBtn.addEventListener('click', () => {
      const cutoff = new Date(cutoffDateInput.value);
      const filtered = allData.filter(c => c.date >= cutoff);
      if (!filtered.length) {
        msg.innerHTML = '<div class="info">Нет данных для экспорта.</div>';
        return;
      }
      const ws = XLSX.utils.json_to_sheet(filtered.map(c => ({
        'ФИО': c.name,
        'Телефон': c.phone,
        'Email': c.email,
        'Дата посл. посещения': c.date.toISOString().slice(0,10)
      })));
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "NPS Клиенты");
      XLSX.writeFile(wb, "клиенты_nps.xlsx");
      msg.innerHTML = '<div class="info">Файл выгружен.</div>';
    });

    // Сброс сохранённых данных
    resetBtn.addEventListener('click', () => {
      if (!confirm('Удалить все сохранённые данные о клиентах?')) return;
      localStorage.removeItem('nps_allData');
      localStorage.removeItem('nps_cutoffDate');
      allData = [];
      tableContainer.innerHTML = '';
      recordCount.textContent = '';
      msg.innerHTML = '<div class="info">Данные сброшены.</div>';
    });
  </script>
</body>
</html>
