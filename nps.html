<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>NPS / Клиенты — Music Club Орёл</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #ff6b6b;
      --bg: #fef9f0;
      --surface: #ffffff;
      --text: #2d3436;
      --text-light: #636e72;
      --border: #e0e0e0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 1.5rem;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .container {
      width: 100%;
      max-width: 1100px;
      background: var(--surface);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .back-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
    }
    h1 { font-size: 1.8rem; font-weight: 700; }
    .btn {
      background: var(--surface);
      border: 2px solid var(--accent);
      color: var(--accent);
      padding: 0.7rem 1.5rem;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.3s;
      margin-left: 0.5rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    .btn:hover {
      background: var(--accent);
      color: white;
      box-shadow: 0 8px 15px rgba(255,107,107,0.3);
    }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .error { color: #d63031; margin: 1rem 0; font-size: 0.9rem; white-space: pre-wrap; }
    .info { color: #636e72; margin: 1rem 0; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
      font-size: 0.9rem;
    }
    th, td {
      text-align: left;
      padding: 0.6rem;
      border-bottom: 1px solid var(--border);
    }
    th { background: #f8f9fa; font-weight: 600; }
    .editable {
      background: transparent;
      border: 1px solid transparent;
      padding: 0.3rem;
      border-radius: 6px;
      width: 100%;
      font-size: 0.9rem;
      color: var(--text);
    }
    .editable:focus {
      border-color: var(--accent);
      outline: none;
      background: #fff;
    }
    @media (max-width: 600px) {
      body { padding: 0.8rem; }
      .container { padding: 1.2rem; }
      table, thead, tbody, th, td, tr { display: block; }
      thead tr { display: none; }
      tbody tr {
        margin-bottom: 1rem;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 0.8rem;
        background: #fafafa;
      }
      td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.4rem 0;
        border: none;
      }
      td::before {
        content: attr(data-label);
        font-weight: 600;
        color: var(--text-light);
        margin-right: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="index.html" class="back-link">← На главную</a>
      <h1>Клиенты с успешными визитами</h1>
      <div>
        <button class="btn" id="loadXlsxBtn">Загрузить отчёт (XLSX)</button>
        <button class="btn" id="loadContactsBtn" style="display:none;">Загрузить данные</button>
        <button class="btn" id="exportBtn" style="display:none;">Выгрузить в Excel</button>
        <button class="btn" id="saveBtn" style="display:none;">Сохранить изменения</button>
      </div>
    </div>
    <div id="message"></div>
    <div id="tableContainer"></div>
    <input type="file" id="xlsxFileInput" accept=".xlsx" style="display:none">
  </div>

  <script>
    const SUPABASE_URL = 'https://ujsakubqnirmpdwmmtju.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqc2FrdWJxbmlybXBkd21tdGp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNDUwOTEsImV4cCI6MjA5ODgyMTA5MX0.8YZCsCpjroirJvKuQie76qXtpOvpmpE7dQoz2G502p4';
    const EDGE_FUNCTION_URL = 'https://ujsakubqnirmpdwmmtju.supabase.co/functions/v1/hyper-responder';
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let customersData = []; // { id, name, phone, email }

    (async () => {
      const { data: { session } } = await _supabase.auth.getSession();
      if (!session) {
        window.location.href = 'login.html';
        return;
      }
    })();

    const fileInput = document.getElementById('xlsxFileInput');
    const loadXlsxBtn = document.getElementById('loadXlsxBtn');
    const loadContactsBtn = document.getElementById('loadContactsBtn');
    const exportBtn = document.getElementById('exportBtn');
    const saveBtn = document.getElementById('saveBtn');
    const msg = document.getElementById('message');
    const tableContainer = document.getElementById('tableContainer');

    loadXlsxBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      msg.innerHTML = '';
      tableContainer.innerHTML = '';
      exportBtn.style.display = 'none';
      saveBtn.style.display = 'none';
      loadContactsBtn.style.display = 'none';
      customersData = [];

      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = new Uint8Array(ev.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const firstSheet = workbook.SheetNames[0];
          const sheet = workbook.Sheets[firstSheet];
          const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

          let headerRowIndex = -1;
          for (let i = 0; i < Math.min(rows.length, 20); i++) {
            const row = rows[i];
            if (!row) continue;
            const rowStr = row.map(c => String(c).trim().toLowerCase()).join(' ');
            if (rowStr.includes('id') || rowStr.includes('фио')) {
              headerRowIndex = i;
              break;
            }
          }
          if (headerRowIndex === -1) {
            msg.innerHTML = '<div class="error">Не удалось найти строку с заголовками (ID/ФИО).</div>';
            return;
          }

          const headers = rows[headerRowIndex].map(h => String(h).trim().toLowerCase());
          const idIdx = headers.findIndex(h => h === 'id');
          const nameIdx = headers.findIndex(h => h.includes('фио') || h.includes('имя') || h.includes('клиент'));

          if (idIdx === -1 || nameIdx === -1) {
            msg.innerHTML = '<div class="error">Не найдены столбцы ID и/или ФИО.</div>';
            return;
          }

          const customers = [];
          for (let i = headerRowIndex + 1; i < rows.length; i++) {
            const cols = rows[i];
            if (!cols || cols.length <= idIdx || cols.length <= nameIdx) continue;
            const idVal = String(cols[idIdx]).trim();
            const nameVal = String(cols[nameIdx]).trim();
            if (!idVal || isNaN(Number(idVal))) continue;
            if (!nameVal || nameVal === '—') continue;
            customers.push({ id: idVal, name: nameVal, phone: '', email: '' });
          }

          const unique = [];
          const seen = new Set();
          for (const c of customers) {
            if (!seen.has(c.id)) {
              seen.add(c.id);
              unique.push(c);
            }
          }

          customersData = unique;
          renderTable(customersData);
          loadContactsBtn.style.display = 'inline-block';
          exportBtn.style.display = 'inline-block';
          saveBtn.style.display = 'inline-block';
          msg.innerHTML = `<div class="info">Загружено ${unique.length} клиентов. Нажмите «Загрузить данные», чтобы получить контакты через API.</div>`;
        } catch (err) {
          msg.innerHTML = `<div class="error">Ошибка обработки файла: ${err.message}</div>`;
        }
      };
      reader.readAsArrayBuffer(file);
    });

    // Загрузка контактов через Edge Function
    loadContactsBtn.addEventListener('click', async () => {
      if (!customersData.length) return;
      loadContactsBtn.disabled = true;
      loadContactsBtn.textContent = 'Загрузка данных...';
      msg.innerHTML = '';
      try {
        const { data: { session } } = await _supabase.auth.getSession();
        if (!session) {
          msg.innerHTML = '<div class="error">Необходимо войти</div>';
          return;
        }

        const ids = customersData.map(c => c.id);
        const response = await fetch(EDGE_FUNCTION_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${session.access_token}`
          },
          body: JSON.stringify({ customer_ids: ids })
        });

        if (!response.ok) {
          const text = await response.text();
          throw new Error(`Ошибка ${response.status}: ${text}`);
        }

        const result = await response.json();
        if (!result.customers) throw new Error('Некорректный ответ сервера');

        // Объединяем с текущими данными
        customersData = customersData.map(cf => {
          const apiData = result.customers.find(ac => String(ac.id) === String(cf.id));
          return {
            id: cf.id,
            name: (apiData && apiData.name && apiData.name !== `ID ${cf.id}`) ? apiData.name : cf.name,
            phone: apiData ? (apiData.phone || cf.phone) : cf.phone,
            email: apiData ? (apiData.email || cf.email) : cf.email,
          };
        });

        renderTable(customersData);
        msg.innerHTML = '<div class="info">Контакты загружены.</div>';
      } catch (err) {
        msg.innerHTML = `<div class="error">${err.message}</div>`;
      } finally {
        loadContactsBtn.disabled = false;
        loadContactsBtn.textContent = 'Загрузить данные';
      }
    });

    // Сохранение в localStorage
    saveBtn.addEventListener('click', () => {
      try {
        localStorage.setItem('nps_customers', JSON.stringify(customersData));
        msg.innerHTML = '<div class="info">Данные сохранены локально.</div>';
      } catch (err) {
        msg.innerHTML = '<div class="error">Ошибка сохранения: ' + err.message + '</div>';
      }
    });

    // Экспорт в Excel
    exportBtn.addEventListener('click', () => {
      const ws = XLSX.utils.json_to_sheet(customersData.map(c => ({ 'ФИО': c.name, 'Телефон': c.phone, 'Email': c.email })));
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Клиенты");
      XLSX.writeFile(wb, "клиенты_с_контактами.xlsx");
      msg.innerHTML = '<div class="info">Файл выгружен.</div>';
    });

    function renderTable(customers) {
      let html = '<table><thead><tr><th>ФИО</th><th>Телефон</th><th>Email</th></tr></thead><tbody>';
      customers.forEach((c, idx) => {
        html += `<tr>
          <td data-label="ФИО">${c.name}</td>
          <td data-label="Телефон"><input class="editable phone-input" data-index="${idx}" value="${c.phone}" placeholder="Введите телефон"></td>
          <td data-label="Email"><input class="editable email-input" data-index="${idx}" value="${c.email}" placeholder="Введите email"></td>
        </tr>`;
      });
      html += '</tbody></table>';
      tableContainer.innerHTML = html;

      document.querySelectorAll('.phone-input').forEach(input => {
        input.addEventListener('input', (e) => {
          const idx = e.target.dataset.index;
          customersData[idx].phone = e.target.value;
        });
      });
      document.querySelectorAll('.email-input').forEach(input => {
        input.addEventListener('input', (e) => {
          const idx = e.target.dataset.index;
          customersData[idx].email = e.target.value;
        });
      });
    }

    // Восстановление из localStorage
    (function restore() {
      const saved = localStorage.getItem('nps_customers');
      if (saved) {
        try {
          customersData = JSON.parse(saved);
          renderTable(customersData);
          loadContactsBtn.style.display = 'inline-block';
          exportBtn.style.display = 'inline-block';
          saveBtn.style.display = 'inline-block';
          msg.innerHTML = '<div class="info">Загружены ранее сохранённые данные.</div>';
        } catch (e) {}
      }
    })();
  </script>
</body>
</html>
